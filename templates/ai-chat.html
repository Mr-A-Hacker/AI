<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#faf8ff"/>
<meta name="color-scheme" content="light"/>
<style>html,body{background:#faf8ff!important;color:#1e1030!important;}</style>
<script>
(function(){
  var T={
    humanizer:{c:'#7c3aed',bg:'rgba(124,58,237,.12)',s:'linear-gradient(135deg,#7c3aed,#6d28d9)'},
    weather:  {c:'#38bdf8',bg:'rgba(56,189,248,.12)',s:'linear-gradient(135deg,#38bdf8,#0ea5e9)'},
    devagent: {c:'#10b981',bg:'rgba(16,185,129,.12)',s:'linear-gradient(135deg,#10b981,#059669)'},
    homework: {c:'#f59e0b',bg:'rgba(245,158,11,.12)',s:'linear-gradient(135deg,#f59e0b,#d97706)'},
    slideshow:{c:'#ea580c',bg:'rgba(234,88,12,.12)', s:'linear-gradient(135deg,#ea580c,#c2410c)'}
  };
  var id=(new URLSearchParams(window.location.search)).get('ai')||'humanizer';
  var t=T[id]||T.humanizer;
  var r=document.documentElement.style;
  r.setProperty('--ai-color',t.c);
  r.setProperty('--ai-bg',t.bg);
  r.setProperty('--ai-send',t.s);
})();
</script>
<title>Viora AI</title>
<!-- Tab favicon -->
<link rel="icon" type="image/png" href="/V.png"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ─── Reset ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ─── Tokens ─── */
:root{
  --bg:#faf8ff; --border:#ede9f8;
  --text:#1e1030; --text-mid:#6b5b8e; --text-light:#a898c8;
  --ai-color:#7c3aed; --ai-bg:rgba(124,58,237,.12);
  --ai-send:linear-gradient(135deg,#7c3aed,#6d28d9);
  /* safe areas */
  --sat:env(safe-area-inset-top,0px);
  --sar:env(safe-area-inset-right,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
}

/* ─── Animations ─── */
@keyframes fadeUp   {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes msgIn    {from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes dot      {0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
@keyframes blob     {0%{transform:translate(0,0) scale(1)}100%{transform:translate(14px,22px) scale(1.07)}}

/* ─── Base ─── */
html,body{
  height:100%; height:100dvh;
  background:var(--bg);
  font-family:'Plus Jakarta Sans',sans-serif;
  color:var(--text);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  -webkit-text-size-adjust:100%;
}

/* ─── Background ─── */
.mesh{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 10% 20%,rgba(124,58,237,.09) 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 90% 10%,rgba(236,72,153,.07) 0%,transparent 70%),
    radial-gradient(ellipse 70% 40% at 60% 90%,rgba(249,115,22,.06) 0%,transparent 70%);
}
.blob{position:fixed;border-radius:50%;filter:blur(50px);pointer-events:none;z-index:0;opacity:.18;animation:blob 9s ease-in-out infinite alternate;}
.blob-1{width:240px;height:240px;background:#c084fc;top:-50px;right:4%;}
.blob-2{width:160px;height:160px;background:#fb923c;bottom:4%;left:-35px;animation-duration:12s;animation-delay:-4s;}

/* ─── Shell ─── */
#app{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  /* honour notch + home bar */
  padding-top:var(--sat);
  padding-right:var(--sar);
  padding-bottom:var(--sab);
  padding-left:var(--sal);
}

/* ─── Header ─── */
#ai-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;flex-shrink:0;
  border-bottom:1.5px solid var(--border);
  background:rgba(250,248,255,.96);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  min-height:56px;
}
.back-btn{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  border:1.5px solid var(--border);background:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.9rem;color:var(--text-mid);transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.back-btn:active{border-color:var(--ai-color);color:var(--ai-color);}
@media(hover:hover){.back-btn:hover{border-color:var(--ai-color);color:var(--ai-color);}}
.ai-logo{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;background:var(--ai-bg);
}
.ai-info{flex:1;min-width:0;}
.ai-name{
  font-family:'Syne',sans-serif;font-weight:800;color:var(--ai-color);
  font-size:clamp(.85rem,2.8vw,1rem);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ai-sub{
  font-size:clamp(.62rem,1.8vw,.7rem);color:var(--text-mid);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.online-badge{
  display:flex;align-items:center;gap:5px;flex-shrink:0;
  padding:4px 10px;border-radius:20px;
  font-size:clamp(.6rem,1.6vw,.68rem);font-weight:600;
  background:var(--ai-bg);color:var(--ai-color);
  border:1.5px solid color-mix(in srgb,var(--ai-color) 28%,transparent);
}
.odot{width:6px;height:6px;border-radius:50%;background:var(--ai-color);animation:dot 2s ease-in-out infinite;}

/* ─── Chat window ─── */
#chat-win{
  flex:1;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;gap:12px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  /* centred column on wide screens */
  padding:16px 16px 10px;
  width:100%;
}
#chat-win::-webkit-scrollbar{width:3px;}
#chat-win::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ─── Welcome ─── */
#welcome-block{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1;text-align:center;
  gap:10px;padding:24px 12px;
  animation:fadeUp .4s ease both;
}
.welcome-orb{
  width:clamp(54px,13vw,70px);height:clamp(54px,13vw,70px);
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-size:clamp(1.5rem,5vw,1.9rem);background:var(--ai-bg);
  box-shadow:0 6px 28px rgba(0,0,0,.1);
  border:2px solid color-mix(in srgb,var(--ai-color) 20%,transparent);
}
#welcome-block h2{
  font-family:'Syne',sans-serif;font-weight:800;color:var(--ai-color);
  font-size:clamp(1.1rem,4.5vw,1.45rem);
}
#welcome-block p{
  font-size:clamp(.78rem,2.2vw,.85rem);
  color:var(--text-mid);max-width:280px;line-height:1.65;
}
.chips-wrap{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:4px;max-width:360px;}
.chip-btn{
  border:1.5px solid var(--border);border-radius:20px;
  padding:7px 12px;font-size:clamp(.7rem,2vw,.77rem);
  color:var(--text-mid);cursor:pointer;background:#fff;
  transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;
  -webkit-tap-highlight-color:transparent;
}
.chip-btn:active{border-color:var(--ai-color);color:var(--ai-color);}
@media(hover:hover){.chip-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:var(--ai-color);color:var(--ai-color);}}

/* ─── Messages ─── */
.sub-msg{display:flex;gap:7px;align-items:flex-end;animation:msgIn .26s cubic-bezier(.34,1.56,.64,1) both;}
.sub-msg.user{flex-direction:row-reverse;}
.sub-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;}
.bubble-wrap{display:flex;flex-direction:column;max-width:min(80%,480px);}
.bubble{
  padding:9px 14px;border-radius:17px;
  font-size:clamp(.8rem,2.2vw,.87rem);line-height:1.6;word-break:break-word;
}
.sub-msg.ai   .bubble{background:#fff;border:1.5px solid var(--border);color:var(--text);border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.sub-msg.user .bubble{color:#fff;border-bottom-right-radius:4px;background:var(--ai-send);}
.msg-time{font-size:.57rem;color:var(--text-light);margin-top:3px;font-weight:500;}
.sub-msg.user .msg-time{text-align:right;}

/* ─── Typing ─── */
#typing-ind{display:none;gap:7px;align-items:flex-end;}
#typing-ind.show{display:flex;}
.typing-dots{
  display:flex;gap:4px;padding:10px 14px;
  background:#fff;border:1.5px solid var(--border);
  border-radius:17px;border-bottom-left-radius:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.td{width:6px;height:6px;border-radius:50%;background:var(--ai-color);animation:dot 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.18s;}.td:nth-child(3){animation-delay:.36s;}

/* ─── Input ─── */
#input-area{
  flex-shrink:0;background:var(--bg);
  padding:8px 12px 12px;
  border-top:1px solid var(--border);
}
.input-card{
  background:#fff;border:1.5px solid var(--border);border-radius:17px;
  padding:9px 9px 9px 14px;display:flex;align-items:flex-end;gap:8px;
  box-shadow:0 3px 16px rgba(0,0,0,.07);
  transition:border-color .2s,box-shadow .2s;
  max-width:780px;margin:0 auto;
}
.input-card:focus-within{
  border-color:color-mix(in srgb,var(--ai-color) 45%,transparent);
  box-shadow:0 3px 22px rgba(0,0,0,.1);
}
#msg-input{
  flex:1;background:none;border:none;outline:none;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:clamp(.84rem,2.2vw,.9rem);
  color:var(--text);resize:none;max-height:96px;line-height:1.5;
  scrollbar-width:thin;
}
#msg-input::placeholder{color:var(--text-light);}
#send-btn{
  width:34px;height:34px;border-radius:11px;flex-shrink:0;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#fff;background:var(--ai-send);
  box-shadow:0 3px 10px rgba(0,0,0,.2);
  transition:transform .18s;
  -webkit-tap-highlight-color:transparent;
}
#send-btn:active{transform:scale(.91);}
@media(hover:hover){#send-btn:hover{transform:scale(1.08);}}

/* ─── Code ─── */
pre{background:#1e1e2e;border-radius:10px;padding:12px;margin:8px 0;overflow-x:auto;}
pre code{font-family:monospace;font-size:.8rem;color:#e2e8f0;white-space:pre;background:none;padding:0;}
code{background:rgba(0,0,0,.07);border-radius:4px;padding:1px 5px;font-size:.82rem;color:var(--text);}

/* ─── Weather card ─── */
.weather-card{
  border-radius:18px;
  padding:clamp(14px,4vw,22px) clamp(12px,4vw,20px) clamp(12px,3vw,18px);
  color:#fff;overflow:hidden;position:relative;
  box-shadow:0 10px 40px rgba(0,0,0,.3);
  width:100%;
}
.w-orb1{position:absolute;top:-35px;right:-35px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none;}
.w-orb2{position:absolute;top:10px;right:10px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;}
.w-stat{background:rgba(255,255,255,.12);backdrop-filter:blur(4px);border-radius:12px;padding:9px 5px;text-align:center;border:1px solid rgba(255,255,255,.1);}
.w-stat-icon{font-size:clamp(1rem,2.8vw,1.25rem);margin-bottom:2px;}
.w-stat-val {font-size:clamp(.68rem,1.9vw,.78rem);font-weight:700;}
.w-stat-lbl {font-size:clamp(.52rem,1.4vw,.58rem);opacity:.42;margin-top:2px;}
.fc-day{display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(255,255,255,.1);border-radius:10px;padding:clamp(6px,2vw,9px) clamp(4px,1.5vw,7px);min-width:38px;flex:1;}

/* Weather loading pill */
.wx-pill{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(56,189,248,.1);border:1.5px solid rgba(56,189,248,.28);
  border-radius:13px;padding:10px 14px;
  font-size:clamp(.76rem,2vw,.82rem);font-weight:600;color:#38bdf8;
}
.wdot{width:6px;height:6px;border-radius:50%;background:#38bdf8;animation:dot 1.2s ease-in-out infinite;}
.wdot:nth-child(2){animation-delay:.18s;}.wdot:nth-child(3){animation-delay:.36s;}

/* Copy button on code blocks */
.code-wrap{position:relative;margin:8px 0;}
.copy-btn{
  position:absolute;top:8px;right:8px;
  padding:4px 10px;border-radius:7px;border:none;
  background:rgba(255,255,255,.12);color:#e2e8f0;
  font-size:.72rem;font-weight:600;cursor:pointer;
  transition:background .18s;letter-spacing:.02em;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.copy-btn:hover{background:rgba(255,255,255,.22);}
.copy-btn.copied{background:rgba(16,185,129,.35);color:#6ee7b7;}

/* Uploaded image preview in chat */
.user-img{
  max-width:220px;max-height:180px;border-radius:12px;
  display:block;margin-bottom:6px;
  border:2px solid rgba(255,255,255,.25);
}

/* Image attach button — shown only for homework */
#img-btn{
  width:34px;height:34px;border-radius:11px;flex-shrink:0;
  border:1.5px solid var(--border);background:#fff;
  cursor:pointer;align-items:center;justify-content:center;
  font-size:1rem;color:var(--text-mid);
  transition:border-color .2s;
  -webkit-tap-highlight-color:transparent;
}
#img-btn:active{border-color:var(--ai-color);}
@media(hover:hover){#img-btn:hover{border-color:var(--ai-color);}}

/* Image preview strip above input */
#img-preview-wrap{
  display:none;align-items:center;gap:8px;
  padding:6px 0 4px;max-width:780px;margin:0 auto;
}
#img-preview{
  width:48px;height:48px;border-radius:9px;object-fit:cover;
  border:2px solid var(--border);
}
#img-remove{
  width:22px;height:22px;border-radius:50%;border:none;
  background:#f43f5e;color:#fff;font-size:.7rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-weight:700;
}

/* City search */
#weather-city-row{display:none;gap:7px;width:100%;max-width:320px;margin-top:5px;}
#weather-city-input{
  flex:1;padding:9px 12px;border-radius:11px;
  border:1.5px solid var(--border);background:#fff;
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:clamp(.8rem,2.2vw,.84rem);outline:none;
  transition:border-color .2s;
}
#weather-city-input:focus{border-color:var(--ai-color);}
#weather-city-input::placeholder{color:var(--text-light);}
#weather-city-btn{
  padding:9px 13px;border-radius:11px;border:none;flex-shrink:0;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:#fff;font-weight:700;cursor:pointer;font-size:.88rem;
  transition:transform .18s;-webkit-tap-highlight-color:transparent;
}
#weather-city-btn:active{transform:scale(.94);}
@media(hover:hover){#weather-city-btn:hover{transform:translateY(-1px);}}

/* ════════════════════════════
   BREAKPOINTS
   ════════════════════════════ */

/* Phone small (< 360px) */
@media(max-width:359px){
  .online-badge,.ai-sub{display:none;}
  #chat-win{padding:12px 10px 8px;}
  .bubble-wrap{max-width:88%;}
  .chips-wrap{gap:5px;}
}

/* Phone (360–430px) — default mobile styles already handle this */
@media(max-width:430px){
  .bubble-wrap{max-width:84%;}
  .online-badge{padding:3px 8px;}
}

/* Tablet (600–900px) */
@media(min-width:600px){
  #chat-win{padding:20px 24px 12px;}
  .bubble-wrap{max-width:72%;}
  #ai-header{padding:12px 24px;min-height:62px;}
  #input-area{padding:10px 24px 14px;}
  #welcome-block p{max-width:340px;}
}

/* Laptop (1024–1440px) */
@media(min-width:1024px){
  #chat-win{padding:24px 0 14px;max-width:760px;margin:0 auto;width:100%;}
  /* wrapper to allow chat to centre while still scrolling full height */
  #chat-scroll-wrap{display:flex;flex-direction:column;align-items:center;overflow:hidden;flex:1;}
  #chat-scroll-wrap > #chat-win{align-self:stretch;}
  .bubble-wrap{max-width:min(65%,500px);}
  #ai-header{padding:14px 32px;}
  #input-area{padding:10px 0 16px;}
  .input-card{max-width:760px;}
  #welcome-block p{max-width:380px;}
}

/* Desktop (1440px+) */
@media(min-width:1440px){
  #chat-win{max-width:860px;}
  .input-card{max-width:860px;}
  .bubble-wrap{max-width:min(60%,520px);}
}

/* ── Slideshow ── */
#slideshow-ui{display:none;flex-direction:column;flex:1;overflow:hidden;}
#slideshow-ui.active{display:flex;}
.ss-setup{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:16px;padding:24px 20px;text-align:center;animation:fadeUp .4s ease both;
}
.ss-setup h2{font-family:'Syne',sans-serif;font-weight:800;color:var(--ai-color);font-size:clamp(1.1rem,4vw,1.4rem);}
.ss-setup p{font-size:.84rem;color:var(--text-mid);max-width:300px;line-height:1.6;}
.ss-topic-row{display:flex;gap:8px;width:100%;max-width:420px;}
.ss-topic-input{
  flex:1;padding:11px 16px;border-radius:14px;
  border:1.5px solid var(--border);background:#fff;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;
  color:var(--text);outline:none;transition:border-color .2s;
}
.ss-topic-input:focus{border-color:var(--ai-color);}
.ss-topic-input::placeholder{color:var(--text-light);}
.ss-num-row{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--text-mid);}
.ss-num-row select{
  padding:6px 10px;border-radius:9px;border:1.5px solid var(--border);
  background:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;
  color:var(--text);outline:none;cursor:pointer;
}
.ss-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:380px;}
.ss-chip{
  border:1.5px solid var(--border);border-radius:20px;
  padding:6px 12px;font-size:.75rem;color:var(--text-mid);
  cursor:pointer;background:#fff;transition:all .2s;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.ss-chip:active{border-color:var(--ai-color);color:var(--ai-color);}
@media(hover:hover){.ss-chip:hover{border-color:var(--ai-color);color:var(--ai-color);transform:translateY(-1px);}}
.ss-go-btn{
  padding:12px 32px;border-radius:14px;border:none;
  background:var(--ai-send);color:#fff;font-family:'Syne',sans-serif;
  font-weight:700;font-size:.95rem;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.2);transition:transform .18s;
}
.ss-go-btn:active{transform:scale(.95);}
@media(hover:hover){.ss-go-btn:hover{transform:translateY(-2px);}}

/* Building state */
.ss-building{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:14px;text-align:center;padding:24px;
}
.ss-building.show{display:flex;}
.ss-prog-bar{width:240px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.ss-prog-fill{height:100%;background:var(--ai-send);border-radius:3px;transition:width .4s ease;width:0%;}
.ss-prog-label{font-size:.8rem;color:var(--text-mid);font-weight:500;}

/* Viewer */
.ss-viewer{display:none;flex-direction:column;flex:1;overflow:hidden;}
.ss-viewer.show{display:flex;}
.ss-viewer-header{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-bottom:1.5px solid var(--border);flex-shrink:0;
  background:rgba(250,248,255,.96);
}
.ss-title-txt{flex:1;font-family:'Syne',sans-serif;font-weight:800;font-size:.92rem;color:var(--ai-color);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ss-dl-btn{
  padding:7px 14px;border-radius:10px;border:none;
  background:var(--ai-send);color:#fff;font-weight:700;
  font-size:.75rem;cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:transform .15s;white-space:nowrap;flex-shrink:0;
}
.ss-dl-btn:active{transform:scale(.94);}
@media(hover:hover){.ss-dl-btn:hover{transform:translateY(-1px);}}
.ss-new-btn{
  padding:7px 12px;border-radius:10px;border:1.5px solid var(--border);
  background:#fff;color:var(--text-mid);font-size:.75rem;
  cursor:pointer;font-weight:600;transition:all .15s;flex-shrink:0;
}
.ss-new-btn:active{border-color:var(--ai-color);color:var(--ai-color);}

/* Slide carousel */
.ss-carousel{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px;display:flex;flex-direction:column;gap:14px;
  -webkit-overflow-scrolling:touch;
}
.ss-slide{
  border-radius:16px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  background:#fff;border:1.5px solid var(--border);
  flex-shrink:0;
  animation:msgIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
.ss-slide-img{
  width:100%;height:clamp(130px,30vw,200px);
  object-fit:cover;display:block;background:#e5e7eb;
}
.ss-slide-img.loading{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.ss-slide-body{padding:14px 16px 16px;}
.ss-slide-num{font-size:.6rem;opacity:.4;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.ss-slide-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(.95rem,3vw,1.1rem);color:var(--text);margin-bottom:10px;line-height:1.3;}
.ss-slide-bullets{list-style:none;display:flex;flex-direction:column;gap:6px;}
.ss-slide-bullets li{
  font-size:clamp(.78rem,2.1vw,.85rem);color:var(--text-mid);
  line-height:1.5;padding-left:14px;position:relative;
}
.ss-slide-bullets li::before{content:"•";position:absolute;left:0;color:var(--ai-color);font-weight:700;}

/* Nav bar */
.ss-nav{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 16px;flex-shrink:0;
  border-top:1px solid var(--border);background:var(--bg);
}
.ss-nav-btn{
  width:34px;height:34px;border-radius:10px;border:1.5px solid var(--border);
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;color:var(--text-mid);transition:all .18s;
  -webkit-tap-highlight-color:transparent;
}
.ss-nav-btn:disabled{opacity:.35;cursor:default;}
.ss-nav-btn:not(:disabled):active{border-color:var(--ai-color);color:var(--ai-color);}
.ss-nav-count{font-size:.8rem;color:var(--text-mid);font-weight:600;min-width:60px;text-align:center;}

</style>
</head>
<body>
<div class="mesh"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div id="app">

  <!-- Header -->
  <header id="ai-header">
    <button class="back-btn" onclick="history.back()" aria-label="Back">←</button>
    <div class="ai-logo" id="hdr-logo"></div>
    <div class="ai-info">
      <div class="ai-name" id="hdr-name"></div>
      <div class="ai-sub"  id="hdr-sub"></div>
    </div>
    <div class="online-badge"><span class="odot"></span>Online</div>
  </header>

  <!-- Chat area -->
  <div id="chat-scroll-wrap" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
    <div id="chat-win">

      <!-- Welcome -->
      <div id="welcome-block">
        <div class="welcome-orb" id="wel-logo" style="background:var(--ai-bg);">⏳</div>
        <h2 id="wel-name" style="color:var(--ai-color);">Loading…</h2>
        <p id="wel-desc" style="color:#6b5b8e;"></p>
        <div id="weather-city-row">
          <input id="weather-city-input" type="text" placeholder="Search a city…"
            onkeydown="if(event.key==='Enter')fetchWeatherCity()" autocomplete="off"/>
          <button id="weather-city-btn" onclick="fetchWeatherCity()">🔍</button>
        </div>
        <div class="chips-wrap" id="chips-wrap"></div>
      </div>

      <!-- Typing indicator -->
      <div id="typing-ind">
        <div class="sub-av" id="typing-av"></div>
        <div class="typing-dots"><div class="td"></div><div class="td"></div><div class="td"></div></div>
      </div>

    </div>
  </div>

  <!-- Slideshow UI (replaces chat for slideshow AI) -->
  <div id="slideshow-ui">

    <!-- Setup screen -->
    <div class="ss-setup" id="ss-setup">
      <div class="welcome-orb" style="font-size:2rem;">🎨</div>
      <h2>AI Slideshow Maker</h2>
      <p>Type any topic and I'll build a beautiful slideshow with real images — download as PDF.</p>
      <div class="ss-topic-row">
        <input class="ss-topic-input" id="ss-topic" type="text" placeholder="e.g. The Solar System, World War II…" autocomplete="off"
          onkeydown="if(event.key==='Enter')startSlideshow()"/>
        <button class="ss-go-btn" onclick="startSlideshow()">✨ Build</button>
      </div>
      <div class="ss-num-row">
        <span>Slides:</span>
        <select id="ss-num">
          <option value="4">4</option>
          <option value="6" selected>6</option>
          <option value="8">8</option>
          <option value="10">10</option>
          <option value="12">12</option>
        </select>
      </div>
      <div class="ss-chips" id="ss-chips"></div>
    </div>

    <!-- Building progress -->
    <div class="ss-building" id="ss-building">
      <div style="font-size:2.5rem;">🎨</div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--ai-color);">Building your slideshow…</div>
      <div class="ss-prog-bar"><div class="ss-prog-fill" id="ss-prog-fill"></div></div>
      <div class="ss-prog-label" id="ss-prog-label">Generating slide content…</div>
    </div>

    <!-- Viewer -->
    <div class="ss-viewer" id="ss-viewer">
      <div class="ss-viewer-header">
        <span class="ss-title-txt" id="ss-pres-title"></span>
        <button class="ss-new-btn" onclick="resetSlideshow()">↺ New</button>
        <button class="ss-dl-btn" id="ss-dl-btn" onclick="downloadPDF()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          PDF
        </button>
      </div>
      <div class="ss-carousel" id="ss-carousel"></div>
      <div class="ss-nav">
        <button class="ss-nav-btn" id="ss-prev" onclick="navSlide(-1)">&#8249;</button>
        <span class="ss-nav-count" id="ss-nav-count">1 / 6</span>
        <button class="ss-nav-btn" id="ss-next" onclick="navSlide(1)">&#8250;</button>
      </div>
    </div>

  </div>

  <!-- Input -->
  <div id="input-area">
    <!-- Image preview strip (homework only) -->
    <div id="img-preview-wrap">
      <img id="img-preview" src="" alt="preview"/>
      <button id="img-remove" onclick="clearImg()" aria-label="Remove image">✕</button>
      <span style="font-size:.75rem;color:var(--text-mid);font-weight:500;">Image attached</span>
    </div>
    <div class="input-card">
      <!-- Hidden file input for image upload -->
      <input type="file" id="img-input" accept="image/*" capture="environment" style="display:none" onchange="handleImgFile(this)"/>
      <button id="img-btn" onclick="document.getElementById('img-input').click()" aria-label="Upload image">📎</button>
      <textarea id="msg-input" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}autoResize(this);"
        oninput="autoResize(this);"
        onpaste="handlePaste(event)"
        aria-label="Message"></textarea>
      <button id="send-btn" onclick="sendMsg()" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div><!-- #app -->

<script>
// ── AI config ──
const HUMANIZER_SYSTEM = [
  "You are the world's most advanced AI text humanizer.",
  "Your mission: rewrite AI-generated text so it is completely undetectable by GPTZero, Turnitin, Copyleaks, Originality.ai, Winston AI, and every other detector, while perfectly preserving the original meaning.",
  "",
  "APPLY ALL RULES EVERY TIME:",
  "1. SENTENCE VARIETY: Mix very short sentences with longer ones. Never 3 sentences the same length in a row.",
  '2. ELIMINATE THESE AI PATTERNS ENTIRELY: "It is important to note", "It is worth noting", "In conclusion", "Furthermore", "Moreover", "Additionally", "Subsequently", "Delve into", "Shed light on", "Crucial", "Vital", passive voice overuse, perfect parallel lists.',
  '3. INJECT HUMAN QUIRKS: Use contractions everywhere. Add occasional sentence fragments for emphasis. Like this. Use colloquial transitions: "Here\'s the thing,", "And honestly,", "Look,", "The truth is,". Add rhetorical questions.',
  "4. RHYTHM: Read it aloud mentally. If it sounds robotic, rewrite it. Aim for a confident intelligent person speaking naturally.",
  "5. WORD CHOICE: Replace formal words with direct ones. utilize->use, commence->start, obtain->get, endeavor->try, facilitate->help.",
  "6. PERPLEXITY & BURSTINESS: Vary vocabulary complexity within sentences AND vary sentence lengths dramatically. These are the primary signals AI detectors measure.",
  "7. PRESERVE meaning, facts, arguments, and approximate word count.",
  "",
  'Output ONLY the rewritten text. No preamble. No "Here is the humanized version:". Just the rewritten text.'
].join("\n");

const DEVAGENT_SYSTEM = [
  "You are an elite AI Developer Agent inside Viora — expert in every programming language, framework, and technology stack.",
  "",
  "RULES:",
  "- Always wrap ALL code in triple-backtick code blocks with the language specified (e.g. ```python, ```javascript)",
  "- Write clean, production-ready, well-commented code",
  "- When debugging, identify the exact root cause before fixing",
  "- Write COMPLETE working code — never truncate with comments like 'rest of code here'",
  "- Explain what the code does concisely after writing it",
  "- Always handle edge cases, errors, and security"
].join("\n");
const HOMEWORK_SYSTEM = [
  "You are a brilliant, patient homework tutor for students of all ages. You can read images of homework problems.",
  "",
  "RULES:",
  "- When given an image, carefully read ALL text, equations, diagrams, and questions visible in the image",
  "- Solve step-by-step, showing all working clearly",
  "- Explain WHY each step works — help them understand, not just copy",
  "- For math: write every step, define variables, state the final answer clearly",
  "- For essays: give specific actionable feedback with examples",
  "- For science: explain concepts in plain language first",
  "- Be warm, positive, and encouraging — never make the student feel dumb"
].join("\n");

const AIS = {
  humanizer:{
    name:'AI Humanizer',sub:'Undetectable human rewriting',logo:'✍️',
    color:'#7c3aed',bg:'rgba(124,58,237,.12)',send:'linear-gradient(135deg,#7c3aed,#6d28d9)',
    placeholder:'Paste AI-written text to humanize…',welcome:'AI Humanizer',
    desc:"Paste AI-generated text and I'll rewrite it so it's 100% undetectable by any AI detector.",
    chips:['Humanize this paragraph','Make it undetectable','Rewrite casually','Fix AI tone'],
    system: HUMANIZER_SYSTEM
  },
  weather:{
    name:'Weather AI',sub:'Detailed forecasts & weather chat',logo:'🌦️',
    color:'#38bdf8',bg:'rgba(56,189,248,.12)',send:'linear-gradient(135deg,#38bdf8,#0ea5e9)',
    placeholder:'Ask about weather anywhere…',welcome:'Weather AI',desc:'Getting your precise location…',
    chips:['Will it rain this week?','Best time to visit Tokyo','What to wear today?','Compare climates'],
    system:'You are a knowledgeable weather assistant. Answer weather questions helpfully. You may receive current conditions in context.'
  },
  devagent:{
    name:'Dev Agent',sub:'Expert programmer & code debugger',logo:'💻',
    color:'#10b981',bg:'rgba(16,185,129,.12)',send:'linear-gradient(135deg,#10b981,#059669)',
    placeholder:'Ask anything about code…',welcome:'Dev Agent',
    desc:'Expert coder. Debug, build apps, explain code, and more.',
    chips:['Debug this code','Build a Python script','Explain this function','Review my code'],
    system: DEVAGENT_SYSTEM
  },
  homework:{
    name:'Homework Helper',sub:'Your personal tutor for every subject',logo:'📚',
    color:'#f59e0b',bg:'rgba(245,158,11,.12)',send:'linear-gradient(135deg,#f59e0b,#d97706)',
    placeholder:'Ask a question or upload a photo of your homework…',
    welcome:'Homework Helper',
    desc:"Upload a photo or paste an image of your homework and I'll solve it step by step.",
    chips:['Solve this math problem','Explain photosynthesis','Help with an essay','Quiz me'],
    system: HOMEWORK_SYSTEM
  },
  slideshow:{
    name:'AI Slideshow Maker',sub:'Beautiful slideshows with real images',logo:'🎨',
    color:'#ea580c',bg:'rgba(234,88,12,.12)',send:'linear-gradient(135deg,#ea580c,#c2410c)',
    placeholder:'Enter a topic for your slideshow…',
    welcome:'AI Slideshow Maker',
    desc:"Type any topic and I'll build a beautiful slideshow with real images you can download as PDF.",
    chips:['Climate Change','The Solar System','World War II','How AI Works','The Human Body','Ancient Rome'],
    system:''
  }
};

const params = new URLSearchParams(window.location.search);
const aiId   = params.get('ai') || 'humanizer';
const AI     = AIS[aiId] || AIS.humanizer;

// Apply theme
const r = document.documentElement.style;
r.setProperty('--ai-color', AI.color);
r.setProperty('--ai-bg',    AI.bg);
r.setProperty('--ai-send',  AI.send);

document.title = AI.name + ' — Viora AI';
document.getElementById('hdr-logo').textContent = AI.logo;
document.getElementById('hdr-name').textContent = AI.name;
document.getElementById('hdr-sub').textContent  = AI.sub;
document.getElementById('wel-logo').textContent = AI.logo;
document.getElementById('wel-name').textContent = AI.welcome;
document.getElementById('wel-desc').textContent = AI.desc;
document.getElementById('msg-input').placeholder = AI.placeholder;
document.getElementById('typing-av').textContent  = AI.logo;
document.getElementById('typing-av').style.background = AI.bg;

// Chips
const cw = document.getElementById('chips-wrap');
AI.chips.forEach(ch => {
  const b = document.createElement('button');
  b.className = 'chip-btn'; b.textContent = ch;
  b.onclick = () => { document.getElementById('msg-input').value = ch; sendMsg(); };
  cw.appendChild(b);
});

// ── Chat engine ──
let history = [], busy = false;

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,96)+'px';}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function fmt(t){
  let ci=0;
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g,function(_,l,c){
      const id='cb'+(ci++);
      return '<div class="code-wrap"><pre><code id="'+id+'">'+c.trim()+'</code></pre>'+
        '<button class="copy-btn" onclick="copyCode(\''+id+'\',this)">Copy</button></div>';
    })
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm,'<strong style="font-size:.9rem;display:block;margin:8px 0 3px;color:'+AI.color+';">$1</strong>')
    .replace(/^[-•] /gm,'• ').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}
function copyCode(id,btn){
  const el=document.getElementById(id);if(!el)return;
  const txt=el.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>flashCopy(btn)).catch(()=>fallbackCopy(txt,btn));
  } else { fallbackCopy(txt,btn); }
}
function fallbackCopy(txt,btn){
  const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);flashCopy(btn);
}
function flashCopy(btn){btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);}
function scrollBottom(){const w=document.getElementById('chat-win');w.scrollTop=w.scrollHeight;}

function addMsg(role,html){
  const wb=document.getElementById('welcome-block');
  if(wb)wb.style.display='none';
  const win=document.getElementById('chat-win');
  const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const d=document.createElement('div');d.className='sub-msg '+role;
  if(role==='user'){
    d.innerHTML='<div class="sub-av" style="background:linear-gradient(135deg,#f97316,#fbbf24);color:#fff;font-weight:700;font-size:.65rem;">U</div><div class="bubble-wrap"><div class="bubble">'+html+'</div><div class="msg-time">'+now+'</div></div>';
  } else {
    d.innerHTML='<div class="sub-av" style="background:'+AI.bg+';">'+AI.logo+'</div><div class="bubble-wrap"><div class="bubble">'+html+'</div><div class="msg-time">'+now+'</div></div>';
  }
  win.insertBefore(d,document.getElementById('typing-ind'));
  scrollBottom();
}

async function sendMsg(){
  if(busy)return;
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  // For homework with image, allow sending image alone (no text required)
  if(!text && !pendingImgB64) return;
  inp.value='';inp.style.height='auto';

  // Build user message content
  let userContent;
  let userHtml;
  if(pendingImgB64){
    // Vision message: image + optional text
    userContent = [
      {type:'image',source:{type:'base64',media_type:pendingImgMime,data:pendingImgB64}},
      {type:'text',text:text||'Please solve this homework problem.'}
    ];
    // Show image thumbnail in chat
    const imgSrc = 'data:'+pendingImgMime+';base64,'+pendingImgB64;
    userHtml = '<img class="user-img" src="'+imgSrc+'" alt="homework image"/>'+(text?'<br>'+esc(text):'');
    clearImg();
  } else {
    userContent = text;
    userHtml = esc(text);
  }

  addMsg('user', userHtml);
  history.push({role:'user',content:userContent});
  busy=true;
  const ti=document.getElementById('typing-ind');ti.classList.add('show');scrollBottom();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:AI.system,messages:history})});
    const data=await res.json();ti.classList.remove('show');
    const reply=(data.content&&data.content[0]&&data.content[0].text)||data.reply||'';
    if(reply){
      // Store plain text in history (not the image base64 again)
      history.push({role:'assistant',content:reply});
      addMsg('ai',fmt(reply));
    } else {
      addMsg('ai','⚠️ '+(data.error||'No response received.'));
    }
  }catch(e){document.getElementById('typing-ind').classList.remove('show');addMsg('ai','⚠️ Network error. Please try again.');}
  busy=false;inp.focus();
}

// ════════════════════════════════════════════
// IMAGE UPLOAD (homework helper)
// ════════════════════════════════════════════
let pendingImgB64 = null;
let pendingImgMime = 'image/jpeg';

if(aiId === 'homework'){
  // Show the attach button
  const imgBtn = document.getElementById('img-btn');
  if(imgBtn) imgBtn.style.display = 'flex';
}

function handleImgFile(input){
  const file = input.files && input.files[0];
  if(!file) return;
  pendingImgMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = function(e){
    pendingImgB64 = e.target.result.split(',')[1];
    const prev = document.getElementById('img-preview');
    const wrap = document.getElementById('img-preview-wrap');
    if(prev){ prev.src = e.target.result; }
    if(wrap){ wrap.style.display = 'flex'; }
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function handlePaste(e){
  // Only intercept paste if we're in homework mode
  if(aiId !== 'homework') return;
  const items = e.clipboardData && e.clipboardData.items;
  if(!items) return;
  for(let i=0;i<items.length;i++){
    if(items[i].type.indexOf('image') !== -1){
      e.preventDefault();
      const file = items[i].getAsFile();
      if(!file) return;
      pendingImgMime = file.type || 'image/jpeg';
      const reader = new FileReader();
      reader.onload = function(ev){
        pendingImgB64 = ev.target.result.split(',')[1];
        const prev = document.getElementById('img-preview');
        const wrap = document.getElementById('img-preview-wrap');
        if(prev) prev.src = ev.target.result;
        if(wrap) wrap.style.display = 'flex';
      };
      reader.readAsDataURL(file);
      return;
    }
  }
}

function clearImg(){
  pendingImgB64 = null;
  const prev = document.getElementById('img-preview');
  const wrap = document.getElementById('img-preview-wrap');
  if(prev) prev.src = '';
  if(wrap) wrap.style.display = 'none';
}

// ════════════════════════════════════════════
// WEATHER
// ════════════════════════════════════════════
if(aiId==='weather'){
  document.getElementById('weather-city-row').style.display='flex';

  const WMO={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Rime fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Moderate rain',65:'Heavy rain',71:'Light snow',73:'Moderate snow',75:'Heavy snow',80:'Rain showers',81:'Moderate showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm w/ hail',99:'Severe thunderstorm'};
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function wxIcon(c){if(c>=95)return'⛈️';if(c>=80)return'🌧️';if(c>=71)return'❄️';if(c>=61)return'🌧️';if(c>=51)return'🌦️';if(c>=45)return'🌫️';if(c>=3)return'☁️';if(c>=1)return'⛅';return'☀️';}
  function wxBg(c){
    if(c>=89)return'linear-gradient(160deg,#1a1a2e,#16213e,#0f3460)';
    if(c>=51)return'linear-gradient(160deg,#1e293b,#1a3a5c,#1e4976)';
    if(c>=45)return'linear-gradient(160deg,#2d3748,#4a5568,#718096)';
    const h=new Date().getHours();
    if(h>=20||h<5)return'linear-gradient(160deg,#0f172a,#1e1b4b,#312e81)';
    if(h<7)return'linear-gradient(160deg,#1e293b,#7c2d12,#ea580c)';
    if(h>=18)return'linear-gradient(160deg,#312e81,#7c3aed,#db2777)';
    return'linear-gradient(160deg,#0369a1,#0284c7,#38bdf8)';
  }
  function fmtTime(iso){try{return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}catch{return iso||'—';}}

  function buildCard(w,loc){
    const icon=wxIcon(w.code||0),bg=wxBg(w.code||0),desc=WMO[w.code]||'Clear';
    const forecast=(w.daily||[]).map(d=>'<div class="fc-day"><span style="font-size:.6rem;opacity:.65;font-weight:600;">'+d.day+'</span><span style="font-size:.95rem;">'+wxIcon(d.code)+'</span><span style="font-size:.68rem;font-weight:700;">'+d.high+'°</span><span style="font-size:.6rem;opacity:.5;">'+d.low+'°</span></div>').join('');
    const stats=[['💧',w.humidity+'%','Humidity'],['💨',w.windMph+' mph','Wind'],['☀️',''+w.uvIndex,'UV Index'],['🌡️',w.feelsF+'°F','Feels Like'],['🧭',w.pressure+' hPa','Pressure'],['👁️',w.visMi+' mi','Visibility']];
    const sg=stats.map(([i,v,l])=>'<div class="w-stat"><div class="w-stat-icon">'+i+'</div><div class="w-stat-val">'+v+'</div><div class="w-stat-lbl">'+l+'</div></div>').join('');
    const sun=(w.sunrise||w.sunset)?'<div style="display:flex;gap:7px;margin-bottom:14px;"><div style="flex:1;background:rgba(255,255,255,.1);border-radius:12px;padding:9px 11px;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.1);"><span style="font-size:1.2rem;">🌅</span><div><div style="font-size:.56rem;opacity:.42;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Sunrise</div><div style="font-size:.82rem;font-weight:700;">'+fmtTime(w.sunrise)+'</div></div></div><div style="flex:1;background:rgba(255,255,255,.1);border-radius:12px;padding:9px 11px;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.1);"><span style="font-size:1.2rem;">🌇</span><div><div style="font-size:.56rem;opacity:.42;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Sunset</div><div style="font-size:.82rem;font-weight:700;">'+fmtTime(w.sunset)+'</div></div></div></div>':'';
    return '<div class="weather-card" style="background:'+bg+'"><div class="w-orb1"></div><div class="w-orb2"></div>'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">'+
        '<div><div style="font-size:.58rem;opacity:.42;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;">📍 Current Weather</div>'+
        '<div style="font-size:clamp(.84rem,2.5vw,.98rem);font-weight:700;line-height:1.3;">'+loc+'</div></div>'+
        '<div style="font-size:clamp(2.6rem,8vw,3.6rem);line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));">'+icon+'</div></div>'+
      '<div style="margin-bottom:3px;"><span style="font-size:clamp(3rem,10vw,4.2rem);font-weight:800;line-height:1;letter-spacing:-2px;">'+w.tempF+'°</span><span style="font-size:clamp(1.1rem,3vw,1.5rem);opacity:.5;font-weight:300;">F</span></div>'+
      '<div style="font-size:clamp(.8rem,2.2vw,.88rem);opacity:.8;margin-bottom:2px;font-weight:500;">'+desc+'</div>'+
      '<div style="font-size:clamp(.68rem,1.9vw,.76rem);opacity:.42;margin-bottom:16px;">Feels like '+w.feelsF+'°F</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:13px;">'+sg+'</div>'+
      sun+
      '<div style="border-top:1px solid rgba(255,255,255,.14);padding-top:13px;">'+
        '<div style="font-size:.58rem;opacity:.38;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:9px;">7-Day Forecast</div>'+
        '<div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch;">'+forecast+'</div></div>'+
      '<div style="margin-top:12px;text-align:right;"><span style="font-size:.56rem;opacity:.25;font-weight:600;letter-spacing:.04em;">⚡ VIORA WEATHER</span></div></div>';
  }

  async function fetchCoords(lat,lon){
    const [omR,gR]=await Promise.all([
      fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,apparent_temperature,weather_code,windspeed_10m,relativehumidity_2m,uv_index,surface_pressure,visibility&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&temperature_unit=fahrenheit&windspeed_unit=mph&forecast_days=7&timezone=auto'),
      fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&zoom=18&addressdetails=1')
    ]);
    const om=await omR.json(),geo=await gR.json();
    const c=om.current,wc=c.weather_code||c.weathercode||0;
    const daily=(om.daily&&om.daily.time||[]).map((ds,i)=>{
      const dc=((om.daily.weather_code||om.daily.weathercode)||[])[i]||0;
      return{day:i===0?'Today':DAYS[new Date(ds+'T12:00:00').getDay()],high:Math.round(om.daily.temperature_2m_max[i]),low:Math.round(om.daily.temperature_2m_min[i]),code:dc};
    });
    const a=geo.address||{},pts=[];
    if(a.road)pts.push((a.house_number?a.house_number+' ':'')+a.road);
    if(a.neighbourhood)pts.push(a.neighbourhood);else if(a.suburb)pts.push(a.suburb);
    pts.push(a.city||a.town||a.village||a.county||'Your Location');
    if(a.state)pts.push(a.state);
    if(a.country_code)pts.push(a.country_code.toUpperCase());
    return{
      weather:{tempF:Math.round(c.temperature_2m),feelsF:Math.round(c.apparent_temperature),humidity:Math.round(c.relativehumidity_2m),windMph:Math.round(c.windspeed_10m),uvIndex:Math.round(c.uv_index||0),pressure:Math.round(c.surface_pressure||0),visMi:c.visibility!=null?(c.visibility/1609.34).toFixed(1):'—',sunrise:om.daily&&om.daily.sunrise&&om.daily.sunrise[0],sunset:om.daily&&om.daily.sunset&&om.daily.sunset[0],code:wc,daily},
      location:pts.join(', ')
    };
  }

  function showLoading(){
    if(document.getElementById('wx-load'))return;
    const wb=document.getElementById('welcome-block');if(wb)wb.style.display='none';
    const win=document.getElementById('chat-win'),p=document.createElement('div');
    p.id='wx-load';p.className='sub-msg ai';
    p.innerHTML='<div class="sub-av" style="background:'+AI.bg+';">'+AI.logo+'</div><div class="wx-pill"><span class="wdot"></span><span class="wdot"></span><span class="wdot"></span> Fetching weather…</div>';
    win.insertBefore(p,document.getElementById('typing-ind'));scrollBottom();
  }
  function removeLoading(){const e=document.getElementById('wx-load');if(e)e.remove();}

  function showCard(w,loc){
    removeLoading();
    const win=document.getElementById('chat-win'),d=document.createElement('div');
    d.className='sub-msg ai';
    const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    d.innerHTML='<div class="sub-av" style="background:'+AI.bg+';">'+AI.logo+'</div><div class="bubble-wrap" style="max-width:min(460px,96vw);">'+buildCard(w,loc)+'<div class="msg-time">'+now+'</div></div>';
    win.insertBefore(d,document.getElementById('typing-ind'));scrollBottom();
  }

  window.addEventListener('load',function(){
    if(!navigator.geolocation){document.getElementById('wel-desc').textContent='GPS unavailable. Search a city below.';return;}
    showLoading();
    navigator.geolocation.getCurrentPosition(
      async function(pos){
        try{
          const r=await fetchCoords(pos.coords.latitude,pos.coords.longitude);
          showCard(r.weather,r.location);
          const w=r.weather;
          history.push({role:'assistant',content:r.location+': '+w.tempF+'°F, feels '+w.feelsF+'°F, '+(WMO[w.code]||'Clear')+', humidity '+w.humidity+'%, wind '+w.windMph+' mph, pressure '+w.pressure+' hPa, visibility '+w.visMi+' mi.'});
        }catch(e){removeLoading();const wb=document.getElementById('welcome-block');if(wb){wb.style.display='';document.getElementById('wel-desc').textContent='Could not load weather. Search a city.';}}
      },
      function(){removeLoading();const wb=document.getElementById('welcome-block');if(wb){wb.style.display='';document.getElementById('wel-desc').textContent='Location denied. Search a city below.';}},
      {enableHighAccuracy:true,timeout:15000,maximumAge:0}
    );
  });

  window.fetchWeatherCity=async function(){
    const inp=document.getElementById('weather-city-input'),city=inp&&inp.value.trim();if(!city)return;
    showLoading();
    try{
      const gR=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(city)+'&format=json&limit=1&addressdetails=1');
      const gD=await gR.json();
      if(!gD.length){removeLoading();addMsg('ai','📍 City not found. Try a different name.');return;}
      const r=await fetchCoords(gD[0].lat,gD[0].lon);
      showCard(r.weather,r.location);if(inp)inp.value='';
    }catch(e){removeLoading();addMsg('ai','⚠️ Could not fetch weather: '+e.message);}
  };
}

// ════════════════════════════════════════════
// SLIDESHOW ENGINE
// ════════════════════════════════════════════
if(aiId === 'slideshow'){
  // Hide normal chat UI, show slideshow UI
  document.getElementById('chat-scroll-wrap').style.display = 'none';
  document.getElementById('input-area').style.display       = 'none';
  document.getElementById('slideshow-ui').classList.add('active');

  // Populate topic chips
  const ssChips = document.getElementById('ss-chips');
  AI.chips.forEach(ch => {
    const b = document.createElement('button');
    b.className = 'ss-chip'; b.textContent = ch;
    b.onclick = () => { document.getElementById('ss-topic').value = ch; startSlideshow(); };
    ssChips.appendChild(b);
  });

  // Focus topic input
  setTimeout(() => { const t = document.getElementById('ss-topic'); if(t) t.focus(); }, 300);
}

let ssSlides = [];
let ssCurrent = 0;
let ssImgCache = {};

function setProgress(pct, label){
  const fill  = document.getElementById('ss-prog-fill');
  const lbl   = document.getElementById('ss-prog-label');
  if(fill) fill.style.width = pct + '%';
  if(lbl)  lbl.textContent  = label;
}

window.startSlideshow = async function(){
  const topic = (document.getElementById('ss-topic').value || '').trim();
  if(!topic){ document.getElementById('ss-topic').focus(); return; }
  const num = parseInt(document.getElementById('ss-num').value) || 6;

  // Show building screen
  document.getElementById('ss-setup').style.display    = 'none';
  document.getElementById('ss-building').classList.add('show');
  document.getElementById('ss-viewer').classList.remove('show');
  setProgress(5, 'Generating slide content…');

  try {
    // 1. Generate slide content
    const genRes  = await fetch('/api/slideshow/generate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ topic, numSlides: num })
    });
    const genData = await genRes.json();
    if(genData.error) throw new Error(genData.error);

    ssSlides = genData.slides || [];
    ssImgCache = {};
    setProgress(20, 'Fetching images…');

    // 2. Fetch images in parallel (with progress)
    let loaded = 0;
    await Promise.all(ssSlides.map(async (slide, i) => {
      try {
        const r = await fetch('/api/slideshow/image?q=' + encodeURIComponent(slide.imageQuery));
        const d = await r.json();
        ssImgCache[i] = d.url || '';
      } catch { ssImgCache[i] = ''; }
      loaded++;
      setProgress(20 + Math.round((loaded / ssSlides.length) * 70), 'Loading image ' + loaded + ' of ' + ssSlides.length + '…');
    }));

    setProgress(100, 'Done!');
    await new Promise(r => setTimeout(r, 400));

    // 3. Render
    renderViewer(genData.title || topic);

  } catch(err) {
    document.getElementById('ss-building').classList.remove('show');
    document.getElementById('ss-setup').style.display = '';
    alert('Could not build slideshow: ' + err.message);
  }
};

function renderViewer(title){
  document.getElementById('ss-building').classList.remove('show');
  document.getElementById('ss-pres-title').textContent = title;

  const carousel = document.getElementById('ss-carousel');
  carousel.innerHTML = '';
  ssCurrent = 0;

  ssSlides.forEach((slide, i) => {
    const el = document.createElement('div');
    el.className  = 'ss-slide';
    el.id         = 'ss-slide-' + i;
    el.style.display = i === 0 ? '' : 'none';

    const imgSrc  = ssImgCache[i] || '';
    const bullets = (slide.bullets || []).map(b => '<li>' + escSS(b) + '</li>').join('');

    el.innerHTML =
      '<img class="ss-slide-img" src="' + escAttr(imgSrc) + '" alt="" ' +
        'onerror="this.style.display=\'none\'" ' +
        'onload="this.classList.remove(\'loading\')">' +
      '<div class="ss-slide-body">' +
        '<div class="ss-slide-num">Slide ' + (i+1) + ' of ' + ssSlides.length + '</div>' +
        '<div class="ss-slide-title">' + escSS(slide.title) + '</div>' +
        '<ul class="ss-slide-bullets">' + bullets + '</ul>' +
      '</div>';

    if(imgSrc) el.querySelector('.ss-slide-img').classList.add('loading');
    carousel.appendChild(el);
  });

  updateNav();
  document.getElementById('ss-viewer').classList.add('show');
}

function escSS(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(t){ return String(t).replace(/"/g,'&quot;'); }

function updateNav(){
  document.getElementById('ss-nav-count').textContent = (ssCurrent+1) + ' / ' + ssSlides.length;
  document.getElementById('ss-prev').disabled = ssCurrent === 0;
  document.getElementById('ss-next').disabled = ssCurrent === ssSlides.length - 1;
}

window.navSlide = function(dir){
  const next = ssCurrent + dir;
  if(next < 0 || next >= ssSlides.length) return;
  document.getElementById('ss-slide-' + ssCurrent).style.display = 'none';
  ssCurrent = next;
  document.getElementById('ss-slide-' + ssCurrent).style.display = '';
  updateNav();
  document.getElementById('ss-carousel').scrollTop = 0;
};

window.resetSlideshow = function(){
  ssSlides = []; ssImgCache = {}; ssCurrent = 0;
  document.getElementById('ss-viewer').classList.remove('show');
  document.getElementById('ss-building').classList.remove('show');
  document.getElementById('ss-setup').style.display = '';
  document.getElementById('ss-topic').value = '';
  document.getElementById('ss-topic').focus();
};

// ── PDF export using jsPDF (loaded from CDN) ──
window.downloadPDF = async function(){
  const btn = document.getElementById('ss-dl-btn');
  btn.textContent = '⏳ Building…'; btn.disabled = true;

  try {
    // Load jsPDF if not already loaded
    if(!window.jspdf){
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    const { jsPDF } = window.jspdf;
    // Landscape 16:9 (960×540 pt)
    const doc = new jsPDF({ orientation:'landscape', unit:'pt', format:[960,540] });
    const W = 960, H = 540;

    // Colour palette based on AI colour
    const accent = AI.color || '#ea580c';

    for(let i = 0; i < ssSlides.length; i++){
      if(i > 0) doc.addPage([W, H], 'landscape');
      const slide = ssSlides[i];

      // Background
      doc.setFillColor(250,248,255);
      doc.rect(0, 0, W, H, 'F');

      // Left colour bar
      doc.setFillColor(...hexToRgb(accent));
      doc.rect(0, 0, 8, H, 'F');

      // Slide image (right half)
      const imgUrl = ssImgCache[i];
      if(imgUrl){
        try {
          const b64 = await urlToBase64(imgUrl);
          if(b64){
            doc.addImage(b64, 'JPEG', W/2, 0, W/2, H, '', 'FAST');
            // Gradient overlay on image
            doc.setFillColor(250,248,255);
            doc.setGState(new doc.GState({opacity:0.18}));
            doc.rect(W/2, 0, W/2, H, 'F');
            doc.setGState(new doc.GState({opacity:1}));
          }
        } catch{}
      }

      // Slide number pill
      doc.setFillColor(...hexToRgb(accent), 0.12);
      doc.roundedRect(28, 28, 72, 20, 5, 5, 'F');
      doc.setTextColor(...hexToRgb(accent));
      doc.setFontSize(9); doc.setFont('helvetica','bold');
      doc.text('SLIDE ' + (i+1) + ' / ' + ssSlides.length, 36, 42);

      // Title
      doc.setTextColor(30, 16, 48);
      doc.setFontSize(28); doc.setFont('helvetica','bold');
      const titleLines = doc.splitTextToSize(slide.title, W/2 - 60);
      doc.text(titleLines, 28, 95);

      // Bullets
      doc.setFontSize(13); doc.setFont('helvetica','normal');
      doc.setTextColor(107, 91, 142);
      let y = 95 + (titleLines.length * 36) + 10;
      (slide.bullets || []).forEach(b => {
        doc.setTextColor(...hexToRgb(accent));
        doc.setFontSize(11); doc.setFont('helvetica','bold');
        doc.text('•', 28, y);
        doc.setTextColor(107, 91, 142);
        doc.setFontSize(12); doc.setFont('helvetica','normal');
        const lines = doc.splitTextToSize(b, W/2 - 65);
        doc.text(lines, 42, y);
        y += lines.length * 17 + 6;
        if(y > H - 50) return;
      });

      // Footer
      doc.setFillColor(237,233,248);
      doc.rect(0, H-30, W, 30, 'F');
      doc.setTextColor(168,152,200);
      doc.setFontSize(8); doc.setFont('helvetica','normal');
      doc.text('⚡ Viora AI', 28, H-12);
      doc.text(document.getElementById('ss-pres-title').textContent, W/2, H-12, {align:'center'});
    }

    const safeTitle = (document.getElementById('ss-pres-title').textContent || 'slideshow').replace(/[^a-z0-9]+/gi,'-').toLowerCase();
    doc.save(safeTitle + '.pdf');

  } catch(err){
    alert('PDF export failed: ' + err.message);
  }

  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> PDF';
  btn.disabled = false;
};

function hexToRgb(hex){
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? [parseInt(r[1],16), parseInt(r[2],16), parseInt(r[3],16)] : [0,0,0];
}

async function urlToBase64(url){
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img,0,0);
      try { resolve(c.toDataURL('image/jpeg',0.85)); }
      catch { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}
// ── end slideshow ──
