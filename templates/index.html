<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viora AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf8ff;
  --surface: #ffffff;
  --border: #ede9f8;
  --violet: #7c3aed;
  --violet-light: #8b5cf6;
  --pink: #ec4899;
  --orange: #f97316;
  --text: #1e1030;
  --text-mid: #6b5b8e;
  --text-light: #a898c8;
  --grad-a: #7c3aed;
  --grad-b: #ec4899;
  --grad-c: #f97316;
  --font-head: 'Syne', sans-serif;
  --font-body: 'Plus Jakarta Sans', sans-serif;
  --red: #ef4444;
}

html, body { height: 100%; background: var(--bg); font-family: var(--font-body); color: var(--text); overflow: hidden; }

/* ── BACKGROUND ── */
.mesh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 10% 20%, rgba(124,58,237,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 90% 10%, rgba(236,72,153,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 70% 40% at 60% 90%, rgba(249,115,22,0.09) 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 30% 70%, rgba(6,182,212,0.08) 0%, transparent 70%);
}
.blob { position: fixed; border-radius: 50%; filter: blur(55px); pointer-events: none; z-index: 0; opacity: 0.3; animation: blobFloat 9s ease-in-out infinite alternate; }
.blob-1 { width: 320px; height: 320px; background: #c084fc; top: -80px; right: 8%; }
.blob-2 { width: 240px; height: 240px; background: #fb923c; bottom: 8%; left: -60px; animation-duration: 12s; animation-delay: -4s; }
.blob-3 { width: 200px; height: 200px; background: #22d3ee; bottom: 28%; right: -40px; animation-duration: 7s; animation-delay: -2s; }

@keyframes blobFloat { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(18px,28px) scale(1.08); } }

/* ── SCREENS ── */
.screen { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; transition: opacity 0.35s, transform 0.35s; }
.screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }

/* ── AUTH SCREEN ── */
#auth-screen { flex-direction: column; padding: 20px; }

.auth-card {
  background: white; border: 1.5px solid var(--border);
  border-radius: 28px; padding: 40px 38px;
  width: 100%; max-width: 420px;
  box-shadow: 0 8px 48px rgba(124,58,237,0.12);
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

.auth-logo {
  display: flex; align-items: center; gap: 10px;
  justify-content: center; margin-bottom: 28px;
}

.auth-logo-mark {
  width: 44px; height: 44px; border-radius: 15px;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b), var(--grad-c));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head); color: white; font-size: 1.2rem; font-weight: 800;
  box-shadow: 0 4px 18px rgba(124,58,237,0.35);
}

.auth-logo-name {
  font-family: var(--font-head); font-size: 1.5rem; font-weight: 800;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b), var(--grad-c));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* Tab switcher */
.auth-tabs {
  display: flex; background: var(--bg); border-radius: 14px;
  padding: 4px; margin-bottom: 26px; gap: 4px;
}

.auth-tab {
  flex: 1; padding: 9px; border: none; background: none;
  border-radius: 11px; font-family: var(--font-body); font-size: 0.85rem;
  font-weight: 600; color: var(--text-light); cursor: pointer; transition: all 0.2s;
}

.auth-tab.active {
  background: white; color: var(--violet);
  box-shadow: 0 2px 10px rgba(124,58,237,0.12);
}

/* Form */
.auth-form { display: flex; flex-direction: column; gap: 14px; }
.auth-form.hidden { display: none; }

.field-label {
  font-size: 0.78rem; font-weight: 600; color: var(--text-mid);
  margin-bottom: 6px; display: block;
}

.field-input {
  width: 100%; padding: 12px 16px; border-radius: 14px;
  border: 1.5px solid var(--border); background: var(--bg);
  font-family: var(--font-body); font-size: 0.9rem; color: var(--text);
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}

.field-input:focus {
  border-color: var(--violet-light);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.09);
}

.field-input::placeholder { color: var(--text-light); }

.auth-error {
  font-size: 0.78rem; color: var(--red); font-weight: 500;
  min-height: 18px; text-align: center;
}

.btn-primary {
  width: 100%; padding: 13px; border: none; border-radius: 16px;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  color: white; font-family: var(--font-head); font-size: 0.95rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 18px rgba(124,58,237,0.35);
  letter-spacing: 0.01em;
}

.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,58,237,0.45); }
.btn-primary:active { transform: translateY(0); }

.divider {
  display: flex; align-items: center; gap: 12px;
  font-size: 0.75rem; color: var(--text-light); font-weight: 500;
  margin: 4px 0;
}

.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.btn-try {
  width: 100%; padding: 12px; border: 2px solid var(--border);
  border-radius: 16px; background: white;
  color: var(--text-mid); font-family: var(--font-head); font-size: 0.88rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center;
  justify-content: center; gap: 8px;
}

.btn-try:hover {
  border-color: var(--violet-light); color: var(--violet);
  box-shadow: 0 4px 18px rgba(124,58,237,0.1);
  transform: translateY(-1px);
}

.try-badge {
  background: linear-gradient(135deg, var(--grad-b), var(--grad-c));
  color: white; font-size: 0.65rem; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
}

/* ── CHAT SCREEN ── */
#chat-screen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  transition: opacity 0.35s;
}

#chat-screen.hidden { opacity: 0; pointer-events: none; }

#app {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  height: 100vh; max-width: 820px;
  margin: 0 auto; padding: 0 20px;
  width: 100%;
}

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0 14px;
  border-bottom: 1.5px solid var(--border);
  flex-shrink: 0;
}

.logo { display: flex; align-items: center; gap: 11px; }

.logo-mark {
  width: 38px; height: 38px; border-radius: 13px;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b), var(--grad-c));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(124,58,237,0.35);
  font-family: var(--font-head); color: white; font-size: 1rem; font-weight: 800;
  animation: logoPulse 3s ease-in-out infinite;
}

@keyframes logoPulse { 0%,100% { box-shadow: 0 4px 16px rgba(124,58,237,.35); } 50% { box-shadow: 0 4px 26px rgba(236,72,153,.5); } }

.logo-name {
  font-family: var(--font-head); font-size: 1.25rem; font-weight: 800;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b), var(--grad-c));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.header-right { display: flex; align-items: center; gap: 10px; }

/* Timer pill */
#timer-pill {
  display: none; align-items: center; gap: 6px;
  background: rgba(239,68,68,0.08); border: 1.5px solid rgba(239,68,68,0.2);
  border-radius: 20px; padding: 5px 13px;
  font-size: 0.75rem; font-weight: 700; color: var(--red);
  animation: timerPulse 1s ease-in-out infinite;
}

#timer-pill.show { display: flex; }

@keyframes timerPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

.timer-icon { font-size: 0.8rem; }

.status-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(124,58,237,0.07); border: 1.5px solid rgba(124,58,237,0.15);
  border-radius: 20px; padding: 5px 13px;
  font-size: 0.72rem; font-weight: 600; color: var(--violet);
}

.status-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #22c55e;
  box-shadow: 0 0 7px rgba(34,197,94,0.7);
  animation: pdot 2s ease-in-out infinite;
}

@keyframes pdot { 0%,100% { transform: scale(1); } 50% { transform: scale(1.35); } }

.btn-logout {
  padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 20px;
  background: white; font-family: var(--font-body); font-size: 0.72rem;
  font-weight: 600; color: var(--text-mid); cursor: pointer; transition: all 0.2s;
}

.btn-logout:hover { border-color: var(--violet-light); color: var(--violet); }

/* ── CHAT WINDOW ── */
#chat-window {
  flex: 1; overflow-y: auto; padding: 28px 0 12px;
  display: flex; flex-direction: column; gap: 16px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}

#chat-window::-webkit-scrollbar { width: 4px; }
#chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

#welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; text-align: center;
  gap: 16px; padding-bottom: 40px;
  animation: fadeUp 0.5s ease both;
}

.welcome-orb {
  width: 76px; height: 76px; border-radius: 26px;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b), var(--grad-c));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 36px rgba(124,58,237,0.38);
  font-family: var(--font-head); color: white; font-size: 2rem; font-weight: 800;
}

#welcome h1 {
  font-family: var(--font-head); font-size: 2rem; font-weight: 800;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b), var(--grad-c));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

#welcome p { font-size: 0.9rem; color: var(--text-mid); max-width: 360px; line-height: 1.7; }

.chips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin-top: 6px; }

.chip {
  background: white; border: 1.5px solid var(--border); border-radius: 18px;
  padding: 12px 16px; font-size: 0.82rem; color: var(--text-mid); cursor: pointer;
  text-align: left; transition: all 0.2s; font-family: var(--font-body);
  font-weight: 500; line-height: 1.4; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.chip:hover { border-color: var(--violet-light); color: var(--violet); box-shadow: 0 4px 18px rgba(124,58,237,0.13); transform: translateY(-2px); }

/* Messages */
.msg { display: flex; gap: 11px; align-items: flex-end; animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes msgIn { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.msg.user { flex-direction: row-reverse; }

.av {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; font-weight: 700;
}

.msg.ai .av { background: linear-gradient(135deg, var(--grad-a), var(--grad-b)); color: white; box-shadow: 0 3px 10px rgba(124,58,237,.3); }
.msg.user .av { background: linear-gradient(135deg, #f97316, #fbbf24); color: white; box-shadow: 0 3px 10px rgba(249,115,22,.3); }

.bubble-wrap { display: flex; flex-direction: column; max-width: 72%; }

.bubble { padding: 13px 18px; border-radius: 22px; font-size: 0.91rem; line-height: 1.65; font-weight: 400; word-break: break-word; }

.msg.ai .bubble { background: white; border: 1.5px solid var(--border); color: var(--text); border-bottom-left-radius: 6px; box-shadow: 0 2px 14px rgba(0,0,0,.06); }
.msg.user .bubble { background: linear-gradient(135deg, var(--grad-a), var(--grad-b)); color: white; border-bottom-right-radius: 6px; box-shadow: 0 4px 20px rgba(124,58,237,.35); }

.msg-time { font-size: 0.62rem; color: var(--text-light); margin-top: 5px; font-weight: 500; }
.msg.user .msg-time { text-align: right; }

#typing { display: none; gap: 11px; align-items: flex-end; animation: msgIn 0.3s ease both; }
#typing.show { display: flex; }

.typing-bubble {
  background: white; border: 1.5px solid var(--border);
  border-radius: 22px; border-bottom-left-radius: 6px;
  padding: 15px 18px; display: flex; align-items: center; gap: 5px;
  box-shadow: 0 2px 14px rgba(0,0,0,.06);
}

.td { width: 7px; height: 7px; border-radius: 50%; background: linear-gradient(135deg, var(--grad-a), var(--grad-b)); animation: tdB 1.1s ease-in-out infinite; }
.td:nth-child(2) { animation-delay: .18s; }
.td:nth-child(3) { animation-delay: .36s; }
@keyframes tdB { 0%,60%,100% { transform: translateY(0) scale(.8); opacity:.3; } 30% { transform: translateY(-6px) scale(1); opacity:1; } }

/* Input */
#input-area { padding: 12px 0 22px; flex-shrink: 0; }

.input-card {
  background: white; border: 1.5px solid var(--border); border-radius: 22px;
  padding: 12px 12px 12px 20px; display: flex; align-items: flex-end; gap: 10px;
  box-shadow: 0 4px 24px rgba(0,0,0,.07); transition: border-color .2s, box-shadow .2s;
}

.input-card:focus-within { border-color: var(--violet-light); box-shadow: 0 4px 32px rgba(124,58,237,.14); }

.input-card.disabled { opacity: 0.5; pointer-events: none; }

#user-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font-body);
  font-size: .92rem; font-weight: 400; resize: none;
  max-height: 120px; line-height: 1.55; scrollbar-width: thin;
}

#user-input::placeholder { color: var(--text-light); }

#send-btn {
  width: 40px; height: 40px; border-radius: 14px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: white; transition: all .2s;
  box-shadow: 0 3px 14px rgba(124,58,237,.4);
}

#send-btn:hover { transform: scale(1.08); box-shadow: 0 5px 20px rgba(124,58,237,.55); }
#send-btn:active { transform: scale(.96); }
#send-btn svg { width: 15px; height: 15px; }

.input-footer { display: flex; justify-content: space-between; padding: 7px 4px 0; }
.input-hint { font-size: .63rem; color: var(--text-light); font-weight: 500; }
#char-count { font-size: .63rem; color: var(--text-light); font-weight: 500; }

/* ── TRIAL EXPIRED OVERLAY ── */
#expired-overlay {
  display: none; position: fixed; inset: 0; z-index: 50;
  background: rgba(250,248,255,0.88); backdrop-filter: blur(12px);
  align-items: center; justify-content: center;
}

#expired-overlay.show { display: flex; }

.expired-card {
  background: white; border: 1.5px solid var(--border);
  border-radius: 28px; padding: 44px 40px; text-align: center;
  max-width: 400px; width: 90%;
  box-shadow: 0 12px 56px rgba(124,58,237,0.16);
  animation: fadeUp 0.4s ease both;
}

.expired-icon { font-size: 3rem; margin-bottom: 16px; }

.expired-card h2 {
  font-family: var(--font-head); font-size: 1.6rem; font-weight: 800;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 10px;
}

.expired-card p { font-size: 0.88rem; color: var(--text-mid); line-height: 1.7; margin-bottom: 24px; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="mesh"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- ── AUTH SCREEN ── -->
<div class="screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">V</div>
      <span class="auth-logo-name">Viora AI</span>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login form -->
    <div class="auth-form" id="login-form">
      <div>
        <label class="field-label">Email</label>
        <input class="field-input" type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div>
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="login-password" placeholder="••••••••" />
      </div>
      <div class="auth-error" id="login-error"></div>
      <button class="btn-primary" onclick="doLogin()">Log In →</button>
      <div class="divider">or</div>
      <button class="btn-try" onclick="startTrial()">
        ⚡ Try for free
        <span class="try-badge">5 min</span>
      </button>
    </div>

    <!-- Signup form -->
    <div class="auth-form hidden" id="signup-form">
      <div>
        <label class="field-label">Your Name</label>
        <input class="field-input" type="text" id="signup-name" placeholder="Jane Doe" />
      </div>
      <div>
        <label class="field-label">Email</label>
        <input class="field-input" type="email" id="signup-email" placeholder="you@example.com" />
      </div>
      <div>
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="signup-password" placeholder="Min. 6 characters" />
      </div>
      <div class="auth-error" id="signup-error"></div>
      <button class="btn-primary" onclick="doSignup()">Create Account →</button>
      <div class="divider">or</div>
      <button class="btn-try" onclick="startTrial()">
        ⚡ Try for free
        <span class="try-badge">5 min</span>
      </button>
    </div>
  </div>
</div>

<!-- ── CHAT SCREEN ── -->
<div id="chat-screen" class="hidden">
  <div id="app">
    <header>
      <div class="logo">
        <div class="logo-mark">V</div>
        <span class="logo-name">Viora AI</span>
      </div>
      <div class="header-right">
        <div id="timer-pill"><span class="timer-icon">⏱</span><span id="timer-display">5:00</span></div>
        <div class="status-badge"><div class="status-dot"></div><span id="user-label">Online</span></div>
        <button class="btn-logout" onclick="doLogout()">Log out</button>
      </div>
    </header>

    <div id="chat-window">
      <div id="welcome">
        <div class="welcome-orb">V</div>
        <h1>Hey, I'm Viora ✦</h1>
        <p id="welcome-sub">Your AI assistant — ask me anything. Writing, coding, ideas, and more.</p>
        <div class="chips-grid">
          <button class="chip" onclick="quickSend(this)">✍️ Write a short story opening</button>
          <button class="chip" onclick="quickSend(this)">💡 Give me a creative business idea</button>
          <button class="chip" onclick="quickSend(this)">🐍 Explain Python list comprehensions</button>
          <button class="chip" onclick="quickSend(this)">🎯 Best productivity tips?</button>
        </div>
      </div>

      <div id="typing">
        <div class="av" style="background:linear-gradient(135deg,#7c3aed,#ec4899);color:white;font-size:.68rem;font-weight:700;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">V</div>
        <div class="typing-bubble">
          <div class="td"></div><div class="td"></div><div class="td"></div>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div class="input-card" id="input-card">
        <textarea id="user-input" rows="1" placeholder="Ask Viora anything…" maxlength="4000"></textarea>
        <button id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="input-hint" id="input-hint-text">Enter to send · Shift+Enter for new line</span>
        <span id="char-count">0 / 4000</span>
      </div>
    </div>
  </div>
</div>

<!-- ── TRIAL EXPIRED OVERLAY ── -->
<div id="expired-overlay">
  <div class="expired-card">
    <div class="expired-icon">⏰</div>
    <h2>Trial Ended</h2>
    <p>Your 5-minute free trial is up! Sign up for a free account to keep chatting with Viora.</p>
    <button class="btn-primary" onclick="goToSignup()" style="margin-bottom:12px;">Create Free Account →</button>
    <button class="btn-try" onclick="doLogout()">Back to Login</button>
  </div>
</div>

<script>
// ── Simple in-memory "user store" ──
const USERS_KEY = 'viora_users';
const SESSION_KEY = 'viora_session';

function getUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY) || '{}'); } catch { return {}; }
}

function saveUsers(u) {
  localStorage.setItem(USERS_KEY, JSON.stringify(u));
}

function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null'); } catch { return null; }
}

function saveSession(s) {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(s));
}

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
  });
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
}

// ── Auth ──
function doLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pw = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  if (!email || !pw) { errEl.textContent = 'Please fill in all fields.'; return; }

  const users = getUsers();
  if (!users[email] || users[email].password !== btoa(pw)) {
    errEl.textContent = 'Invalid email or password.'; return;
  }

  saveSession({ email, name: users[email].name, isTrial: false });
  openChat(users[email].name, false);
}

function doSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim().toLowerCase();
  const pw = document.getElementById('signup-password').value;
  const errEl = document.getElementById('signup-error');
  errEl.textContent = '';

  if (!name || !email || !pw) { errEl.textContent = 'Please fill in all fields.'; return; }
  if (pw.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
  if (!email.includes('@')) { errEl.textContent = 'Please enter a valid email.'; return; }

  const users = getUsers();
  if (users[email]) { errEl.textContent = 'An account with this email already exists.'; return; }

  users[email] = { name, password: btoa(pw) };
  saveUsers(users);
  saveSession({ email, name, isTrial: false });
  openChat(name, false);
}

async function startTrial() {
  const btn = document.querySelector('.btn-try');
  if (btn) { btn.textContent = 'Checking…'; btn.disabled = true; }

  try {
    const res = await fetch('/api/trial-start', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
    const data = await res.json();

    if (!data.allowed) {
      // Show limit message on whichever error el is visible
      const errEl = document.getElementById('login-error').closest('.auth-form:not(.hidden)')
        ? document.getElementById('login-error')
        : document.getElementById('signup-error');
      errEl.textContent = '⚠️ Sorry, you have already used your free trial.';
      if (btn) { btn.innerHTML = '⚡ Try for free <span class="try-badge">5 min</span>'; btn.disabled = false; }
      return;
    }
  } catch(e) {
    // If server check fails, allow trial anyway
  }

  if (btn) { btn.innerHTML = '⚡ Try for free <span class="try-badge">5 min</span>'; btn.disabled = false; }
  saveSession({ name: 'Guest', isTrial: true });
  openChat('Guest', true);
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  clearTimer();
  history = [];
  document.getElementById('chat-window').querySelectorAll('.msg').forEach(m => m.remove());
  document.getElementById('welcome').style.display = '';
  document.getElementById('expired-overlay').classList.remove('show');
  document.getElementById('chat-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('input-card').classList.remove('disabled');
  document.getElementById('input-hint-text').textContent = 'Enter to send · Shift+Enter for new line';
}

function goToSignup() {
  doLogout();
  switchTab('signup');
}

function openChat(name, isTrial) {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('chat-screen').classList.remove('hidden');
  document.getElementById('user-label').textContent = name;
  const sub = document.getElementById('welcome-sub');
  if (isTrial) {
    sub.textContent = "You have 5 minutes to explore. Sign up to unlock unlimited access!";
    startTimer();
  } else {
    sub.textContent = "Your AI assistant — ask me anything. Writing, coding, ideas, and more.";
  }
}

// ── Timer ──
let timerInterval = null;
let trialSeconds = 300;

function startTimer() {
  trialSeconds = 300;
  document.getElementById('timer-pill').classList.add('show');
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    trialSeconds--;
    updateTimerDisplay();
    if (trialSeconds <= 0) {
      clearTimer();
      expireTrial();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(trialSeconds / 60);
  const s = trialSeconds % 60;
  document.getElementById('timer-display').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timer-pill').classList.remove('show');
}

function expireTrial() {
  document.getElementById('input-card').classList.add('disabled');
  document.getElementById('input-hint-text').textContent = 'Trial ended — sign up to continue';
  document.getElementById('expired-overlay').classList.add('show');
}

// ── Chat ──
const chatEl = document.getElementById('chat-window');
const welcomeEl = document.getElementById('welcome');
const typingEl = document.getElementById('typing');
const inputEl = document.getElementById('user-input');
const charEl = document.getElementById('char-count');
let history = [];
let busy = false;

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  charEl.textContent = inputEl.value.length + ' / 4000';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function scrollBot() { chatEl.scrollTop = chatEl.scrollHeight; }

function addMsg(role, text) {
  const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  const session = getSession();
  const initials = session?.name ? session.name[0].toUpperCase() : 'U';
  d.innerHTML = `
    <div class="av">${role === 'ai' ? 'V' : initials}</div>
    <div class="bubble-wrap">
      <div class="bubble">${escHtml(text)}</div>
      <div class="msg-time">${now}</div>
    </div>`;
  chatEl.insertBefore(d, typingEl);
  scrollBot();
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function quickSend(btn) {
  inputEl.value = btn.textContent.replace(/^\S+\s/,'').trim();
  sendMessage();
}

// ── Weather detection ──
function isWeatherQuery(text) {
  return /weather|temperature|forecast|rain|sunny|cloudy|snow|wind|humidity|hot outside|cold outside|degrees/i.test(text);
}

// ── Get GPS coords from browser ──
function getBrowserLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
      ()  => resolve(null),
      { timeout: 6000 }
    );
  });
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || busy) return;
  if (trialSeconds <= 0 && getSession()?.isTrial) return;

  if (welcomeEl) welcomeEl.style.display = 'none';
  inputEl.value = ''; inputEl.style.height = 'auto'; charEl.textContent = '0 / 4000';
  addMsg('user', text);
  history.push({ role: 'user', content: text });

  busy = true;
  typingEl.classList.add('show');
  scrollBot();

  // Get GPS coords if weather query
  let coords = null;
  if (isWeatherQuery(text)) {
    coords = await getBrowserLocation();
  }

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: 'You are Viora, a friendly, warm and helpful AI assistant. Be clear, concise and encouraging. Avoid excessive markdown unless the user asks for it.',
        messages: history,
        coords: coords   // null if not a weather query or user denied
      })
    });

    const data = await res.json();
    typingEl.classList.remove('show');

    if (data.error) {
      addMsg('ai', '⚠️ ' + data.error);
    } else {
      const reply = data.content?.[0]?.text || 'Hmm, no response. Try again!';
      addMsg('ai', reply);
      history.push({ role: 'assistant', content: reply });
    }
  } catch (err) {
    typingEl.classList.remove('show');
    addMsg('ai', '⚠️ Connection error: ' + err.message);
  }

  busy = false;
  inputEl.focus();
}

// ── Auto-restore session ──
window.addEventListener('load', () => {
  const s = getSession();
  if (s) openChat(s.name, s.isTrial);
});
</script>
