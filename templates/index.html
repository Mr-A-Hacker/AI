<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viora AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf8ff;
  --surface: #ffffff;
  --border: #ede9f8;
  --violet: #7c3aed;
  --violet-light: #8b5cf6;
  --pink: #ec4899;
  --orange: #f97316;
  --text: #1e1030;
  --text-mid: #6b5b8e;
  --text-light: #a898c8;
  --grad-a: #7c3aed;
  --grad-b: #ec4899;
  --grad-c: #f97316;
  --font-head: 'Syne', sans-serif;
  --font-body: 'Plus Jakarta Sans', sans-serif;
}

html, body { height: 100%; background: var(--bg); font-family: var(--font-body); color: var(--text); overflow: hidden; }

.mesh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 10% 20%, rgba(124,58,237,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 90% 10%, rgba(236,72,153,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 70% 40% at 60% 90%, rgba(249,115,22,0.09) 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 30% 70%, rgba(6,182,212,0.08) 0%, transparent 70%);
}

.blob { position: fixed; border-radius: 50%; filter: blur(55px); pointer-events: none; z-index: 0; opacity: 0.3; animation: blobFloat 9s ease-in-out infinite alternate; }
.blob-1 { width: 320px; height: 320px; background: #c084fc; top: -80px; right: 8%; }
.blob-2 { width: 240px; height: 240px; background: #fb923c; bottom: 8%; left: -60px; animation-duration: 12s; animation-delay: -4s; }
.blob-3 { width: 200px; height: 200px; background: #22d3ee; bottom: 28%; right: -40px; animation-duration: 7s; animation-delay: -2s; }

@keyframes blobFloat {
  0%   { transform: translate(0,0) scale(1); }
  100% { transform: translate(18px, 28px) scale(1.08); }
}

#app {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  height: 100vh; max-width: 820px;
  margin: 0 auto; padding: 0 20px;
}

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0 14px;
  border-bottom: 1.5px solid var(--border);
  flex-shrink: 0;
}

.logo { display: flex; align-items: center; gap: 11px; }

.logo-mark {
  width: 40px; height: 40px; border-radius: 14px;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b), var(--grad-c));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(124,58,237,0.35);
  animation: logoPulse 3s ease-in-out infinite;
  font-family: var(--font-head); color: white; font-size: 1.1rem; font-weight: 800;
}

@keyframes logoPulse {
  0%,100% { box-shadow: 0 4px 18px rgba(124,58,237,0.35); }
  50% { box-shadow: 0 4px 28px rgba(236,72,153,0.5); }
}

.logo-name {
  font-family: var(--font-head); font-size: 1.35rem; font-weight: 800;
  background: linear-gradient(135deg, var(--grad-a) 0%, var(--grad-b) 60%, var(--grad-c) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.header-right { display: flex; align-items: center; gap: 10px; }

.status-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(124,58,237,0.07); border: 1.5px solid rgba(124,58,237,0.15);
  border-radius: 20px; padding: 5px 13px;
  font-size: 0.72rem; font-weight: 600; color: var(--violet);
}

.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 7px rgba(34,197,94,0.7);
  animation: pdot 2s ease-in-out infinite;
}

@keyframes pdot { 0%,100% { transform: scale(1); } 50% { transform: scale(1.35); } }

.model-chip {
  font-size: 0.7rem; font-weight: 700;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  color: white; border-radius: 20px; padding: 5px 13px;
  box-shadow: 0 2px 10px rgba(124,58,237,0.3);
}

#chat-window {
  flex: 1; overflow-y: auto; padding: 28px 0 12px;
  display: flex; flex-direction: column; gap: 16px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}

#chat-window::-webkit-scrollbar { width: 4px; }
#chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

#welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; text-align: center;
  gap: 16px; padding-bottom: 40px;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.welcome-orb {
  width: 76px; height: 76px; border-radius: 26px;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b), var(--grad-c));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 36px rgba(124,58,237,0.38);
  font-family: var(--font-head); color: white; font-size: 2rem; font-weight: 800;
  margin-bottom: 4px;
}

#welcome h1 {
  font-family: var(--font-head); font-size: 2.1rem; font-weight: 800;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b), var(--grad-c));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.1;
}

#welcome p { font-size: 0.92rem; color: var(--text-mid); max-width: 360px; line-height: 1.7; }

.chips-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; width: 100%; max-width: 500px; margin-top: 6px;
}

.chip {
  background: white; border: 1.5px solid var(--border);
  border-radius: 18px; padding: 12px 16px;
  font-size: 0.82rem; color: var(--text-mid); cursor: pointer;
  text-align: left; transition: all 0.2s; font-family: var(--font-body);
  font-weight: 500; line-height: 1.4;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.chip:hover {
  border-color: var(--violet-light); color: var(--violet);
  box-shadow: 0 4px 18px rgba(124,58,237,0.13);
  transform: translateY(-2px);
}

.msg { display: flex; gap: 11px; align-items: flex-end; animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }

@keyframes msgIn { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

.msg.user { flex-direction: row-reverse; }

.av {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; font-weight: 700;
}

.msg.ai .av { background: linear-gradient(135deg, var(--grad-a), var(--grad-b)); color: white; box-shadow: 0 3px 10px rgba(124,58,237,0.3); }
.msg.user .av { background: linear-gradient(135deg, #f97316, #fbbf24); color: white; box-shadow: 0 3px 10px rgba(249,115,22,0.3); }

.bubble-wrap { display: flex; flex-direction: column; max-width: 72%; }

.bubble {
  padding: 13px 18px; border-radius: 22px;
  font-size: 0.91rem; line-height: 1.65; font-weight: 400;
  word-break: break-word;
}

.msg.ai .bubble {
  background: white; border: 1.5px solid var(--border);
  color: var(--text); border-bottom-left-radius: 6px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.06);
}

.msg.user .bubble {
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  color: white; border-bottom-right-radius: 6px;
  box-shadow: 0 4px 20px rgba(124,58,237,0.35);
}

.msg-time { font-size: 0.62rem; color: var(--text-light); margin-top: 5px; font-weight: 500; }
.msg.user .msg-time { text-align: right; }

#typing { display: none; gap: 11px; align-items: flex-end; animation: msgIn 0.3s ease both; }
#typing.show { display: flex; }

.typing-bubble {
  background: white; border: 1.5px solid var(--border);
  border-radius: 22px; border-bottom-left-radius: 6px;
  padding: 15px 18px; display: flex; align-items: center; gap: 5px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.06);
}

.td {
  width: 7px; height: 7px; border-radius: 50%;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  animation: tdB 1.1s ease-in-out infinite;
}
.td:nth-child(2) { animation-delay: 0.18s; }
.td:nth-child(3) { animation-delay: 0.36s; }

@keyframes tdB { 0%,60%,100% { transform: translateY(0) scale(0.8); opacity: 0.3; } 30% { transform: translateY(-6px) scale(1); opacity: 1; } }

#input-area { padding: 12px 0 22px; flex-shrink: 0; }

.input-card {
  background: white; border: 1.5px solid var(--border);
  border-radius: 22px; padding: 12px 12px 12px 20px;
  display: flex; align-items: flex-end; gap: 10px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-card:focus-within {
  border-color: var(--violet-light);
  box-shadow: 0 4px 32px rgba(124,58,237,0.14);
}

#user-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font-body);
  font-size: 0.92rem; font-weight: 400; resize: none;
  max-height: 120px; line-height: 1.55; scrollbar-width: thin;
}

#user-input::placeholder { color: var(--text-light); }

#send-btn {
  width: 40px; height: 40px; border-radius: 14px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: white; transition: all 0.2s;
  box-shadow: 0 3px 14px rgba(124,58,237,0.4);
}

#send-btn:hover { transform: scale(1.08); box-shadow: 0 5px 20px rgba(124,58,237,0.55); }
#send-btn:active { transform: scale(0.96); }
#send-btn svg { width: 15px; height: 15px; }

.input-footer { display: flex; justify-content: space-between; padding: 7px 4px 0; }
.input-hint { font-size: 0.63rem; color: var(--text-light); font-weight: 500; }
#char-count { font-size: 0.63rem; color: var(--text-light); font-weight: 500; }
</style>
</head>
<body>
<div class="mesh"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div id="app">
  <header>
    <div class="logo">
      <div class="logo-mark">V</div>
      <span class="logo-name">Viora AI</span>
    </div>
    <div class="header-right">
      <div class="status-badge"><div class="status-dot"></div>Online</div>
      <div class="model-chip">Free AI</div>
    </div>
  </header>

  <div id="chat-window">
    <div id="welcome">
      <div class="welcome-orb">V</div>
      <h1>Hey, I'm Viora ✦</h1>
      <p>Your AI assistant — ask me anything. Writing, coding, ideas, explanations and more.</p>
      <div class="chips-grid">
        <button class="chip" onclick="quickSend(this)">✍️ Write a short story opening</button>
        <button class="chip" onclick="quickSend(this)">💡 Give me a creative business idea</button>
        <button class="chip" onclick="quickSend(this)">🐍 Explain Python list comprehensions</button>
        <button class="chip" onclick="quickSend(this)">🎯 What are the best productivity tips?</button>
      </div>
    </div>

    <div id="typing">
      <div class="av" style="background:linear-gradient(135deg,#7c3aed,#ec4899);color:white;font-size:.68rem;font-weight:700;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 10px rgba(124,58,237,.3)">V</div>
      <div class="typing-bubble">
        <div class="td"></div><div class="td"></div><div class="td"></div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-card">
      <textarea id="user-input" rows="1" placeholder="Ask Viora anything…" maxlength="4000"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter to send · Shift+Enter for new line</span>
      <span id="char-count">0 / 4000</span>
    </div>
  </div>
</div>

<script>
const chatEl = document.getElementById('chat-window');
const welcomeEl = document.getElementById('welcome');
const typingEl = document.getElementById('typing');
const inputEl = document.getElementById('user-input');
const charEl = document.getElementById('char-count');
let history = [];
let busy = false;

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  charEl.textContent = inputEl.value.length + ' / 4000';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function scrollBot() { chatEl.scrollTop = chatEl.scrollHeight; }

function addMsg(role, text) {
  const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `
    <div class="av">${role === 'ai' ? 'V' : 'U'}</div>
    <div class="bubble-wrap">
      <div class="bubble">${escHtml(text)}</div>
      <div class="msg-time">${now}</div>
    </div>`;
  chatEl.insertBefore(d, typingEl);
  scrollBot();
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function quickSend(btn) {
  inputEl.value = btn.textContent.replace(/^\S+\s/,'').trim();
  sendMessage();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || busy) return;
  if (welcomeEl) welcomeEl.style.display = 'none';

  inputEl.value = ''; inputEl.style.height = 'auto'; charEl.textContent = '0 / 4000';
  addMsg('user', text);
  history.push({ role: 'user', content: text });

  busy = true;
  typingEl.classList.add('show');
  scrollBot();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: 'You are Viora, a friendly, warm and helpful AI assistant. Be clear, concise and encouraging. Avoid excessive markdown unless the user asks for it.',
        messages: history
      })
    });

    const data = await res.json();
    typingEl.classList.remove('show');

    if (data.error) {
      addMsg('ai', '⚠️ ' + data.error);
    } else {
      const reply = data.content?.[0]?.text || 'Hmm, no response received. Try again!';
      addMsg('ai', reply);
      history.push({ role: 'assistant', content: reply });
    }
  } catch (err) {
    typingEl.classList.remove('show');
    addMsg('ai', '⚠️ Connection error: ' + err.message);
  }

  busy = false;
  inputEl.focus();
}
</script>
</body>
</html>
