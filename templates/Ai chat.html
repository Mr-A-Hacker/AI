<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Viora AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf8ff; --border: #ede9f8;
  --text: #1e1030; --text-mid: #6b5b8e; --text-light: #a898c8;
  --surface: #ffffff;
  --ai-color: #7c3aed; --ai-bg: rgba(124,58,237,.12); --ai-send: linear-gradient(135deg,#7c3aed,#6d28d9);
}
@keyframes fadeUp    { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes msgIn     { from{opacity:0;transform:translateY(10px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes pdot      { 0%,100%{transform:scale(1)} 50%{transform:scale(1.35)} }
@keyframes spin      { to{transform:rotate(360deg)} }
@keyframes blobFloat { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(18px,28px) scale(1.08)} }
html,body { height:100%; background:var(--bg); font-family:'Plus Jakarta Sans',sans-serif; color:var(--text); overflow:hidden; }
@supports (height:100dvh) { html,body { height:100dvh; } #app { height:100dvh; } }

/* Background */
.mesh { position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 10% 20%,rgba(124,58,237,.1) 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 90% 10%,rgba(236,72,153,.08) 0%,transparent 70%),
    radial-gradient(ellipse 70% 40% at 60% 90%,rgba(249,115,22,.07) 0%,transparent 70%); }
.blob { position:fixed;border-radius:50%;filter:blur(55px);pointer-events:none;z-index:0;opacity:.25;animation:blobFloat 9s ease-in-out infinite alternate; }
.blob-1 { width:280px;height:280px;background:#c084fc;top:-60px;right:6%; }
.blob-2 { width:200px;height:200px;background:#fb923c;bottom:6%;left:-50px;animation-duration:12s;animation-delay:-4s; }

/* Layout */
#app { position:fixed;inset:0;z-index:10;display:flex;flex-direction:column; }

/* Header */
#ai-header {
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;flex-shrink:0;
  border-bottom:1.5px solid var(--border);
  background:rgba(250,248,255,.95);backdrop-filter:blur(12px);
  padding-top:max(14px, env(safe-area-inset-top));
}
.back-btn {
  width:38px;height:38px;border-radius:12px;
  border:1.5px solid var(--border);background:white;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1rem;color:var(--text-mid);transition:all .2s;flex-shrink:0;
}
.back-btn:hover { border-color:var(--ai-color);color:var(--ai-color); }
.ai-logo {
  width:38px;height:38px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;background:var(--ai-bg);flex-shrink:0;
}
.ai-info { flex:1;min-width:0; }
.ai-name { font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--ai-color); }
.ai-sub  { font-size:.72rem;color:var(--text-mid);margin-top:1px; }
.online-badge {
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:20px;
  font-size:.7rem;font-weight:600;
  border:1.5px solid;flex-shrink:0;background:var(--ai-bg);
  color:var(--ai-color);border-color:color-mix(in srgb,var(--ai-color) 35%,transparent);
}
.online-dot { width:7px;height:7px;border-radius:50%;background:var(--ai-color);animation:pdot 2s ease-in-out infinite; }

/* Chat window */
#chat-win {
  flex:1;overflow-y:auto;padding:20px 20px 12px;
  display:flex;flex-direction:column;gap:14px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#chat-win::-webkit-scrollbar { width:4px; }
#chat-win::-webkit-scrollbar-thumb { background:var(--border);border-radius:4px; }

/* Welcome */
#welcome-block {
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1;text-align:center;
  gap:13px;padding:28px 16px;animation:fadeUp .4s ease both;
}
.welcome-orb {
  width:72px;height:72px;border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;background:var(--ai-bg);
  box-shadow:0 8px 32px rgba(0,0,0,.12);
  border:2px solid color-mix(in srgb,var(--ai-color) 25%,transparent);
}
#welcome-block h2 { font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--ai-color); }
#welcome-block p  { font-size:.86rem;color:var(--text-mid);max-width:320px;line-height:1.65; }
.chips-wrap { display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px; }
.chip-btn {
  border:1.5px solid var(--border);border-radius:20px;padding:8px 14px;
  font-size:.79rem;color:var(--text-mid);cursor:pointer;background:white;
  transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;
}
.chip-btn:hover { transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.08);border-color:var(--ai-color);color:var(--ai-color); }

/* Messages */
.sub-msg { display:flex;gap:10px;align-items:flex-end;animation:msgIn .3s cubic-bezier(.34,1.56,.64,1) both; }
.sub-msg.user { flex-direction:row-reverse; }
.sub-av { width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem; }
.bubble-wrap { display:flex;flex-direction:column;max-width:75%; }
.bubble { padding:11px 16px;border-radius:20px;font-size:.88rem;line-height:1.6;word-break:break-word; }
.sub-msg.ai   .bubble { background:white;border:1.5px solid var(--border);color:var(--text);border-bottom-left-radius:5px;box-shadow:0 2px 12px rgba(0,0,0,.06); }
.sub-msg.user .bubble { color:white;border-bottom-right-radius:5px;background:var(--ai-send); }
.msg-time { font-size:.6rem;color:var(--text-light);margin-top:4px;font-weight:500; }
.sub-msg.user .msg-time { text-align:right; }

/* Typing */
#typing-ind { display:none;gap:10px;align-items:flex-end; }
#typing-ind.show { display:flex; }
.typing-dots {
  display:flex;gap:4px;padding:12px 16px;
  background:white;border:1.5px solid var(--border);
  border-radius:20px;border-bottom-left-radius:5px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.td { width:7px;height:7px;border-radius:50%;background:var(--ai-color);animation:pdot 1.2s ease-in-out infinite; }
.td:nth-child(2){animation-delay:.18s;} .td:nth-child(3){animation-delay:.36s;}

/* Input area */
#input-area {
  padding:10px 16px 20px;flex-shrink:0;background:var(--bg);
  padding-bottom:max(20px, env(safe-area-inset-bottom));
}
.input-card {
  background:white;border:1.5px solid var(--border);border-radius:20px;
  padding:11px 11px 11px 18px;display:flex;align-items:flex-end;gap:9px;
  box-shadow:0 4px 20px rgba(0,0,0,.07);transition:border-color .2s,box-shadow .2s;
}
.input-card:focus-within { box-shadow:0 4px 28px rgba(0,0,0,.1); }
#msg-input {
  flex:1;background:none;border:none;outline:none;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;color:var(--text);
  resize:none;max-height:110px;line-height:1.5;scrollbar-width:thin;
}
#msg-input::placeholder { color:var(--text-light); }
#send-btn {
  width:38px;height:38px;border-radius:13px;flex-shrink:0;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:white;transition:all .2s;background:var(--ai-send);
}
#send-btn:hover  { transform:scale(1.07); }
#send-btn:active { transform:scale(.95); }

/* Code blocks */
pre  { background:#1e1e2e;border-radius:10px;padding:12px;margin:8px 0;overflow-x:auto; }
code { font-family:monospace;font-size:.82rem;color:#e2e8f0;white-space:pre; }
p code,li code { background:rgba(0,0,0,.08);border-radius:4px;padding:1px 5px;font-size:.83rem;color:var(--text);white-space:normal; }

/* ── Weather card ── */
.weather-card {
  border-radius:22px;padding:24px 22px 20px;color:#fff;
  overflow:hidden;position:relative;
  box-shadow:0 14px 50px rgba(0,0,0,.35);
}
.weather-orb1 { position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none; }
.weather-orb2 { position:absolute;top:14px;right:14px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none; }
.weather-stat { background:rgba(255,255,255,.12);backdrop-filter:blur(4px);border-radius:14px;padding:11px 6px;text-align:center;border:1px solid rgba(255,255,255,.1); }
.weather-stat-icon { font-size:1.3rem;margin-bottom:3px; }
.weather-stat-val  { font-size:.8rem;font-weight:700; }
.weather-stat-lbl  { font-size:.6rem;opacity:.45;margin-top:3px; }
.forecast-day { display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,.1);border-radius:12px;padding:10px 8px;min-width:46px;flex:1; }

/* Weather fetch pill */
.weather-fetch-pill {
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(56,189,248,.1);border:1.5px solid rgba(56,189,248,.3);
  border-radius:16px;padding:12px 18px;font-size:.84rem;font-weight:600;
  color:#38bdf8;margin:8px 0;
}
.wdot { width:7px;height:7px;border-radius:50%;background:#38bdf8;animation:pdot 1.2s ease-in-out infinite; }
.wdot:nth-child(2){animation-delay:.18s;} .wdot:nth-child(3){animation-delay:.36s;}

/* Weather city search (shown in welcome block for weather AI) */
#weather-city-row { display:flex;gap:8px;margin-top:8px;width:100%;max-width:340px; }
#weather-city-input {
  flex:1;padding:10px 14px;border-radius:12px;
  border:1.5px solid var(--border);background:white;
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.85rem;outline:none;transition:border-color .2s;
}
#weather-city-input:focus { border-color:var(--ai-color); }
#weather-city-input::placeholder { color:var(--text-light); }
#weather-city-btn {
  padding:10px 16px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:white;font-weight:700;cursor:pointer;font-size:.9rem;transition:all .2s;
}
#weather-city-btn:hover { transform:translateY(-1px); }
</style>
</head>
<body>
<div class="mesh"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div id="app">
  <!-- Header -->
  <div id="ai-header">
    <button class="back-btn" onclick="window.close()" title="Close">✕</button>
    <div class="ai-logo" id="hdr-logo"></div>
    <div class="ai-info">
      <div class="ai-name" id="hdr-name"></div>
      <div class="ai-sub"  id="hdr-sub"></div>
    </div>
    <div class="online-badge">
      <span class="online-dot"></span>Online
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-win">
    <div id="welcome-block">
      <div class="welcome-orb" id="wel-logo"></div>
      <h2 id="wel-name"></h2>
      <p  id="wel-desc"></p>
      <!-- Weather city search injected here for weather AI -->
      <div id="weather-city-row" style="display:none;">
        <input id="weather-city-input" type="text" placeholder="Search a city…"
          onkeydown="if(event.key==='Enter') fetchWeatherCity()" />
        <button id="weather-city-btn" onclick="fetchWeatherCity()">🔍</button>
      </div>
      <div class="chips-wrap" id="chips-wrap"></div>
    </div>

    <div id="typing-ind">
      <div class="sub-av" id="typing-av"></div>
      <div class="typing-dots">
        <div class="td"></div><div class="td"></div><div class="td"></div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <div class="input-card">
      <textarea id="msg-input" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}autoResize(this);"
        oninput="autoResize(this);"></textarea>
      <button id="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// ── AI definitions (mirrors SUB_AIS in index.html) ──
const AIS = {
  humanizer: {
    name:'AI Humanizer', sub:'Make AI text sound natural', logo:'✍️',
    color:'#7c3aed', bg:'rgba(124,58,237,.12)', send:'linear-gradient(135deg,#7c3aed,#6d28d9)',
    placeholder:'Paste AI-written text to humanize…',
    welcome:'AI Humanizer', desc:'Paste any AI-generated text and I\'ll rewrite it to sound natural, warm, and human.',
    chips:['Humanize this paragraph','Make it less robotic','Rewrite casually','Fix AI tone'],
    system:'You are an AI text humanizer. Rewrite AI-generated text to sound natural, warm and human. Keep the meaning intact but vary sentence structure, add personality, and remove robotic patterns.'
  },
  weather: {
    name:'Weather AI', sub:'Detailed forecasts & weather chat', logo:'🌦️',
    color:'#38bdf8', bg:'rgba(56,189,248,.12)', send:'linear-gradient(135deg,#38bdf8,#0ea5e9)',
    placeholder:'Ask about weather anywhere…',
    welcome:'Weather AI', desc:'Ask me about weather anywhere in the world, or let me detect your location.',
    chips:['Weather today','Will it rain this week?','Best time to visit Tokyo','Compare climates'],
    system:'You are a knowledgeable weather assistant. Answer weather questions helpfully. For real-time data you may receive current conditions in the message context. Otherwise use your knowledge to give accurate general forecasts and climate info.'
  },
  devagent: {
    name:'Dev Agent', sub:'Expert programmer & code debugger', logo:'💻',
    color:'#10b981', bg:'rgba(16,185,129,.12)', send:'linear-gradient(135deg,#10b981,#059669)',
    placeholder:'Ask anything about code…',
    welcome:'Dev Agent', desc:'Expert coder. I can debug, build apps, explain code, and more.',
    chips:['Debug this code','Build a Python script','Explain this function','Review my code'],
    system:'You are an expert AI Developer Agent built into Viora. Write clean production-ready code. Use code blocks for all code. Be concise but thorough.'
  },
  homework: {
    name:'Homework Helper', sub:'Your personal tutor for every subject', logo:'📚',
    color:'#f59e0b', bg:'rgba(245,158,11,.12)', send:'linear-gradient(135deg,#f59e0b,#d97706)',
    placeholder:'Ask any homework question…',
    welcome:'Homework Helper', desc:'Math, science, history and more. Step-by-step explanations.',
    chips:['Solve this math problem','Explain photosynthesis','Help with an essay','Quiz me'],
    system:'You are a friendly homework helper for students. Give clear step-by-step explanations. Encourage learning, don\'t just give answers.'
  }
};

// ── Boot: read ?ai= param ──
const params = new URLSearchParams(window.location.search);
const aiId   = params.get('ai') || 'humanizer';
const AI     = AIS[aiId] || AIS['humanizer'];

// Apply theme colours as CSS vars
document.documentElement.style.setProperty('--ai-color', AI.color);
document.documentElement.style.setProperty('--ai-bg',    AI.bg);
document.documentElement.style.setProperty('--ai-send',  AI.send);

// Set page title
document.title = AI.name + ' — Viora AI';

// Populate header
document.getElementById('hdr-logo').textContent = AI.logo;
document.getElementById('hdr-name').textContent = AI.name;
document.getElementById('hdr-sub').textContent  = AI.sub;

// Populate welcome block
document.getElementById('wel-logo').textContent = AI.logo;
document.getElementById('wel-name').textContent = AI.welcome;
document.getElementById('wel-desc').textContent = AI.desc;

// Chips
const chipsWrap = document.getElementById('chips-wrap');
AI.chips.forEach(ch => {
  const btn = document.createElement('button');
  btn.className = 'chip-btn';
  btn.textContent = ch;
  btn.onclick = () => { document.getElementById('msg-input').value = ch; sendMsg(); };
  chipsWrap.appendChild(btn);
});

// Placeholder
document.getElementById('msg-input').placeholder = AI.placeholder;

// Typing indicator avatar
document.getElementById('typing-av').textContent  = AI.logo;
document.getElementById('typing-av').style.background = AI.bg;

// ── Chat state ──
let history = [];
let busy    = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function escHtml(t) {
  return String(t)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

function formatReply(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) =>
      '<pre><code>' + code.trim() + '</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm, '<strong style="font-size:.92rem;display:block;margin:8px 0 3px;color:' + AI.color + ';">$1</strong>')
    .replace(/^[-•] /gm, '• ')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

function scrollBottom() {
  const win = document.getElementById('chat-win');
  win.scrollTop = win.scrollHeight;
}

function addMsg(role, html) {
  // Hide welcome block on first message
  const wb = document.getElementById('welcome-block');
  if (wb) wb.style.display = 'none';

  const win  = document.getElementById('chat-win');
  const now  = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const isUser = (role === 'user');

  const d = document.createElement('div');
  d.className = 'sub-msg ' + role;

  if (isUser) {
    d.innerHTML =
      '<div class="sub-av" style="background:linear-gradient(135deg,#f97316,#fbbf24);color:white;font-weight:700;font-size:.7rem;">U</div>' +
      '<div class="bubble-wrap"><div class="bubble">' + html + '</div><div class="msg-time">' + now + '</div></div>';
  } else {
    d.innerHTML =
      '<div class="sub-av" style="background:' + AI.bg + ';">' + AI.logo + '</div>' +
      '<div class="bubble-wrap"><div class="bubble">' + html + '</div><div class="msg-time">' + now + '</div></div>';
  }

  const typing = document.getElementById('typing-ind');
  win.insertBefore(d, typing);
  scrollBottom();
}

async function sendMsg() {
  if (busy) return;
  const inp  = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';

  addMsg('user', escHtml(text));
  history.push({ role:'user', content:text });
  busy = true;

  const typingEl = document.getElementById('typing-ind');
  typingEl.classList.add('show');
  scrollBottom();

  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ system: AI.system, messages: history })
    });
    const data = await res.json();
    typingEl.classList.remove('show');

    const reply = (data.content && data.content[0] && data.content[0].text) || data.reply || '';
    if (reply) {
      history.push({ role:'assistant', content:reply });
      addMsg('ai', formatReply(reply));
    } else {
      addMsg('ai', '⚠️ ' + (data.error || 'No response received.'));
    }
  } catch(e) {
    document.getElementById('typing-ind').classList.remove('show');
    addMsg('ai', '⚠️ Network error. Please try again.');
  }

  busy = false;
  inp.focus();
}

// ══════════════════════════════════════════
// WEATHER LOGIC (only active for weather AI)
// ══════════════════════════════════════════
if (aiId === 'weather') {
  // Show city search row in welcome block
  document.getElementById('weather-city-row').style.display = 'flex';

  const WMO = {
    0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
    45:'Foggy',48:'Rime fog',
    51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
    61:'Light rain',63:'Moderate rain',65:'Heavy rain',
    71:'Light snow',73:'Moderate snow',75:'Heavy snow',
    80:'Rain showers',81:'Moderate showers',82:'Heavy showers',
    95:'Thunderstorm',96:'Thunderstorm w/ hail',99:'Severe thunderstorm'
  };
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function wxIcon(code) {
    if (code >= 95) return '⛈️';
    if (code >= 80) return '🌧️';
    if (code >= 71) return '❄️';
    if (code >= 61) return '🌧️';
    if (code >= 51) return '🌦️';
    if (code >= 45) return '🌫️';
    if (code >= 3)  return '☁️';
    if (code >= 1)  return '⛅';
    return '☀️';
  }

  function wxBg(code) {
    if (code >= 89) return 'linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)';
    if (code >= 51) return 'linear-gradient(160deg,#1e293b 0%,#1a3a5c 60%,#1e4976 100%)';
    if (code >= 45) return 'linear-gradient(160deg,#2d3748 0%,#4a5568 60%,#718096 100%)';
    const h = new Date().getHours();
    if (h >= 20 || h < 5)  return 'linear-gradient(160deg,#0f172a 0%,#1e1b4b 50%,#312e81 100%)';
    if (h < 7)             return 'linear-gradient(160deg,#1e293b 0%,#7c2d12 50%,#ea580c 100%)';
    if (h >= 18)           return 'linear-gradient(160deg,#312e81 0%,#7c3aed 40%,#db2777 100%)';
    return 'linear-gradient(160deg,#0369a1 0%,#0284c7 50%,#38bdf8 100%)';
  }

  function buildWeatherCard(w, locationName) {
    const icon = wxIcon(w.code || 0);
    const bg   = wxBg(w.code || 0);
    const desc = WMO[w.code] || w.desc || 'Clear';

    const forecastHTML = (w.daily || []).map(d =>
      '<div class="forecast-day">' +
        '<span style="font-size:.65rem;opacity:.65;font-weight:600;">' + d.day + '</span>' +
        '<span style="font-size:1.1rem;">' + wxIcon(d.code) + '</span>' +
        '<span style="font-size:.72rem;font-weight:700;">' + d.high + '°</span>' +
        '<span style="font-size:.65rem;opacity:.5;">' + d.low + '°</span>' +
      '</div>'
    ).join('');

    const stats = [
      ['💧', w.humidity + '%',    'Humidity'],
      ['💨', w.windMph + ' mph',  'Wind'],
      ['☀️', '' + w.uvIndex,      'UV Index'],
      ['🌡️', w.feelsF + '°F',    'Feels Like']
    ];
    const statsHTML = stats.map(([icon, val, lbl]) =>
      '<div class="weather-stat">' +
        '<div class="weather-stat-icon">' + icon + '</div>' +
        '<div class="weather-stat-val">'  + val  + '</div>' +
        '<div class="weather-stat-lbl">'  + lbl  + '</div>' +
      '</div>'
    ).join('');

    return '<div class="weather-card" style="background:' + bg + ';">' +
      '<div class="weather-orb1"></div>' +
      '<div class="weather-orb2"></div>' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">' +
        '<div>' +
          '<div style="font-size:.68rem;opacity:.5;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;">📍 Your Weather</div>' +
          '<div style="font-size:1.05rem;font-weight:700;">' + locationName + '</div>' +
        '</div>' +
        '<div style="font-size:3.8rem;line-height:1;filter:drop-shadow(0 2px 10px rgba(0,0,0,.3));">' + icon + '</div>' +
      '</div>' +
      '<div style="margin-bottom:4px;">' +
        '<span style="font-size:4.5rem;font-weight:800;line-height:1;letter-spacing:-3px;">' + w.tempF + '°</span>' +
        '<span style="font-size:1.6rem;opacity:.55;font-weight:300;">F</span>' +
      '</div>' +
      '<div style="font-size:.9rem;opacity:.8;margin-bottom:3px;font-weight:500;">' + desc + '</div>' +
      '<div style="font-size:.78rem;opacity:.45;margin-bottom:22px;">Feels like ' + w.feelsF + '°F</div>' +
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:20px;">' + statsHTML + '</div>' +
      '<div style="border-top:1px solid rgba(255,255,255,.14);padding-top:16px;">' +
        '<div style="font-size:.63rem;opacity:.45;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:11px;">7-Day Forecast</div>' +
        '<div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;">' + forecastHTML + '</div>' +
      '</div>' +
      '<div style="margin-top:15px;text-align:right;"><span style="font-size:.6rem;opacity:.3;font-weight:600;letter-spacing:.04em;">⚡ VIORA WEATHER</span></div>' +
    '</div>';
  }

  async function fetchWeatherCoords(lat, lon) {
    const omUrl =
      'https://api.open-meteo.com/v1/forecast' +
      '?latitude=' + lat + '&longitude=' + lon +
      '&current=temperature_2m,apparent_temperature,weather_code,windspeed_10m,relativehumidity_2m,uv_index' +
      '&daily=weather_code,temperature_2m_max,temperature_2m_min' +
      '&temperature_unit=fahrenheit&windspeed_unit=mph&forecast_days=7&timezone=auto';

    const [omRes, geoRes] = await Promise.all([
      fetch(omUrl),
      fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json')
    ]);
    const omData  = await omRes.json();
    const geoData = await geoRes.json();

    const cur = omData.current;
    const wc  = cur.weather_code || cur.weathercode || 0;
    const daily = (omData.daily && omData.daily.time || []).map((ds, i) => {
      const dc = ((omData.daily.weather_code || omData.daily.weathercode) || [])[i] || 0;
      return {
        day:  i === 0 ? 'Today' : DAY_NAMES[new Date(ds + 'T12:00:00').getDay()],
        high: Math.round(omData.daily.temperature_2m_max[i]),
        low:  Math.round(omData.daily.temperature_2m_min[i]),
        code: dc
      };
    });
    const city    = (geoData.address && (geoData.address.city || geoData.address.town || geoData.address.village || geoData.address.county)) || 'Your Location';
    const country = (geoData.address && geoData.address.country_code && geoData.address.country_code.toUpperCase()) || '';

    return {
      weather: {
        tempF:   Math.round(cur.temperature_2m),
        feelsF:  Math.round(cur.apparent_temperature),
        humidity:Math.round(cur.relativehumidity_2m),
        windMph: Math.round(cur.windspeed_10m),
        uvIndex: Math.round(cur.uv_index || 0),
        code: wc,
        daily
      },
      location: city + (country ? ', ' + country : '')
    };
  }

  // Show loading pill inside chat win (above typing indicator)
  function showWeatherLoading() {
    const existing = document.getElementById('wx-loading');
    if (existing) return;
    const wb = document.getElementById('welcome-block');
    if (wb) wb.style.display = 'none';
    const win  = document.getElementById('chat-win');
    const pill = document.createElement('div');
    pill.id = 'wx-loading';
    pill.className = 'sub-msg ai';
    pill.innerHTML =
      '<div class="sub-av" style="background:' + AI.bg + ';">' + AI.logo + '</div>' +
      '<div class="weather-fetch-pill">' +
        '<span class="wdot"></span><span class="wdot"></span><span class="wdot"></span>' +
        ' Fetching weather…' +
      '</div>';
    win.insertBefore(pill, document.getElementById('typing-ind'));
    scrollBottom();
  }

  function removeWeatherLoading() {
    const el = document.getElementById('wx-loading');
    if (el) el.remove();
  }

  function showWeatherCard(w, location) {
    removeWeatherLoading();
    const win = document.getElementById('chat-win');
    const d   = document.createElement('div');
    d.className = 'sub-msg ai';
    const now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    d.innerHTML =
      '<div class="sub-av" style="background:' + AI.bg + ';">' + AI.logo + '</div>' +
      '<div class="bubble-wrap" style="max-width:min(420px,92vw);">' +
        buildWeatherCard(w, location) +
        '<div class="msg-time">' + now + '</div>' +
      '</div>';
    win.insertBefore(d, document.getElementById('typing-ind'));
    scrollBottom();
  }

  // Auto-fetch GPS on load
  window.addEventListener('load', function() {
    if (!navigator.geolocation) return;
    showWeatherLoading();
    navigator.geolocation.getCurrentPosition(
      async function(pos) {
        try {
          const result = await fetchWeatherCoords(pos.coords.latitude, pos.coords.longitude);
          showWeatherCard(result.weather, result.location);
          const sum = result.location + ': ' + result.weather.tempF + '°F, feels ' + result.weather.feelsF + '°F, ' + (WMO[result.weather.code] || 'Clear') + ', humidity ' + result.weather.humidity + '%, wind ' + result.weather.windMph + ' mph.';
          history.push({ role:'assistant', content: sum });
        } catch(e) {
          removeWeatherLoading();
          const wb = document.getElementById('welcome-block');
          if (wb) wb.style.display = '';
        }
      },
      function() {
        // GPS denied — just remove loading, show welcome with city search
        removeWeatherLoading();
        const wb = document.getElementById('welcome-block');
        if (wb) wb.style.display = '';
      },
      { timeout: 12000 }
    );
  });

  // City search (called from button / enter key in welcome block)
  window.fetchWeatherCity = async function() {
    const input = document.getElementById('weather-city-input');
    const city  = input && input.value.trim();
    if (!city) return;
    showWeatherLoading();
    try {
      const geoRes  = await fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(city) + '&format=json&limit=1');
      const geoData = await geoRes.json();
      if (!geoData.length) {
        removeWeatherLoading();
        addMsg('ai', '📍 City not found. Try a different name.');
        return;
      }
      const { lat, lon, display_name } = geoData[0];
      const locationName = display_name.split(',').slice(0,2).join(',').trim();
      const result = await fetchWeatherCoords(lat, lon);
      showWeatherCard(result.weather, locationName);
      if (input) input.value = '';
    } catch(e) {
      removeWeatherLoading();
      addMsg('ai', '⚠️ Could not fetch weather: ' + e.message);
    }
  };
}
// ── end weather ──
</script>
